name: Gig 1.0 Compiler and Builder

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Environment
      uses: android-actions/setup-android@v3
    - run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
    - uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Create Transpiler and Java Wrapper
      run: |
        cat << 'EOF' > transpiler.py
        import os, re
        def compile_gig(file_path):
            if not os.path.exists(file_path): return ""
            with open(file_path, 'r', encoding='utf-8') as f: lines = f.readlines()
            cpp_code = ""
            for line in lines:
                line = line.strip()
                if not line or line.startswith("#"): continue
                parts = re.findall(r'(?:[^\s"]|"(?:\\.|[^"])*")+', line)
                if not parts: continue
                cmd = parts[0]
                try:
                    if cmd == "background":
                        cpp_code += f"glClearColor({parts[1]}, {parts[2]}, {parts[3]}, 1.0f); glClear(GL_COLOR_BUFFER_BIT);\n"
                    elif cmd == "rect":
                        cpp_code += f"drawRect({parts[1]}, {parts[2]}, {parts[3]}, {parts[4]}, {parts[5]}, {parts[6]}, {parts[7]});\n"
                    elif cmd == "button":
                        txt = parts[1]; x, y, w = parts[2], parts[3], parts[4]
                        h = parts[5] if len(parts) > 5 else "100.0f"
                        cpp_code += f"drawButton({txt}, {x}, {y}, {w}, {h});\n"
                except: pass
            return cpp_code

        logic = compile_gig('main.gig')
        template = """
        #include <android_native_app_glue.h>
        #include <GLES2/gl2.h>
        #include <EGL/egl.h>
        extern "C" {
            void drawRect(float x, float y, float w, float h, float r, float g, float b) {}
            void drawButton(const char* t, float x, float y, float w, float h) {}
            void android_main(struct android_app* state) {
                EGLDisplay d = eglGetDisplay(EGL_DEFAULT_DISPLAY);
                eglInitialize(d, 0, 0);
                EGLConfig cfg; EGLint n;
                EGLint attrs[] = { EGL_RENDERABLE_TYPE, EGL_OPENGL_ES2_BIT, EGL_BLUE_SIZE, 8, EGL_GREEN_SIZE, 8, EGL_RED_SIZE, 8, EGL_NONE };
                eglChooseConfig(d, attrs, &cfg, 1, &n);
                EGLContext ctx = eglCreateContext(d, cfg, NULL, new EGLint[3]{EGL_CONTEXT_CLIENT_VERSION, 2, EGL_NONE});
                EGLSurface s = EGL_NO_SURFACE;
                while (1) {
                    int id, ev; struct android_poll_source* src;
                    while ((id = ALooper_pollOnce(state->window ? 0 : -1, NULL, &ev, (void**)&src)) >= 0) {
                        if (src) src->process(state, src);
                        if (state->destroyRequested) return;
                    }
                    if (state->window && s == EGL_NO_SURFACE) {
                        s = eglCreateWindowSurface(d, cfg, state->window, NULL);
                        eglMakeCurrent(d, s, s, ctx);
                    }
                    if (s != EGL_NO_SURFACE) {
                        {LOGIC}
                        eglSwapBuffers(d, s);
                    }
                }
            }
        }
        """.replace("{LOGIC}", logic)
        with open("generated_main.cpp", "w") as f: f.write(template)
        EOF
        python3 transpiler.py

        mkdir -p com/gig/game
        cat << 'EOF' > com/gig/game/MainActivity.java
        package com.gig.game;
        import android.app.NativeActivity;
        public class MainActivity extends NativeActivity {
            static {
                System.loadLibrary("main");
            }
        }
        EOF

    - name: Build Libraries (All ABIs)
      run: |
        TC=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin
        GLUE=$ANDROID_NDK_ROOT/sources/android/native_app_glue
        FLAGS="-shared -fPIC -I$GLUE -landroid -llog -lGLESv2 -lEGL -static-libstdc++"
        
        $TC/aarch64-linux-android24-clang -c $GLUE/android_native_app_glue.c -o glue64.o -I$GLUE
        $TC/aarch64-linux-android24-clang++ generated_main.cpp glue64.o $FLAGS -o libmain64.so
        
        $TC/armv7a-linux-androideabi24-clang -c $GLUE/android_native_app_glue.c -o glue32.o -I$GLUE
        $TC/armv7a-linux-androideabi24-clang++ generated_main.cpp glue32.o $FLAGS -o libmain32.so

    - name: Compile Java to DEX
      run: |
        javac -source 8 -target 8 -d . -classpath $ANDROID_HOME/platforms/android-34/android.jar com/gig/game/MainActivity.java
        $ANDROID_HOME/build-tools/34.0.0/d8 com/gig/game/*.class --lib $ANDROID_HOME/platforms/android-34/android.jar --output .

    - name: Assemble APK
      run: |
        mkdir -p staging/lib/arm64-v8a staging/lib/armeabi-v7a
        cp libmain64.so staging/lib/arm64-v8a/libmain.so
        cp libmain32.so staging/lib/armeabi-v7a/libmain.so
        cp classes.dex staging/
        
        cat << 'EOF' > AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.gig.game">
            <uses-sdk android:minSdkVersion="24" android:targetSdkVersion="34" />
            <application android:label="Gig 1.0" android:hasCode="true" android:extractNativeLibs="true">
                <activity android:name=".MainActivity"
                          android:configChanges="orientation|keyboardHidden|screenSize"
                          android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        BT=$ANDROID_HOME/build-tools/34.0.0
        $BT/aapt package -f -M AndroidManifest.xml -I $ANDROID_HOME/platforms/android-34/android.jar -F unsorted.apk staging/
        $BT/zipalign -p -f -v 4 unsorted.apk aligned.apk
        keytool -genkey -v -keystore my.keystore -alias gig -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=G" -storepass 123456 -keypass 123456 || true
        $BT/apksigner sign --ks my.keystore --ks-pass pass:123456 --out Gig1.0.apk aligned.apk

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Gig1.0-Build
        path: Gig1.0.apk
