name: GigLang Real Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================================
  #  WINDOWS (x86_64)
  # ============================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install NASM
        run: choco install nasm -y
      - name: Build GigLang
        shell: bash
        run: |
          cat << 'EOF' > main.gig
          let x = 10
          let y = 20
          let z = x + y
          print("Hello from Windows!")
          print("x = ")
          print(x)
          print("y = ")
          print(y)
          print("z = ")
          print(z)
          EOF
          nasm -f win64 program.asm -o program.obj
          gcc -no-pie program.obj -o GigLang.exe -lc
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: GigLang-Windows
          path: GigLang.exe

  # ============================================================
  #  LINUX (x86_64)
  # ============================================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: sudo apt-get install -y nasm gcc
      - name: Build
        shell: bash
        run: |
          cat << 'EOF' > main.gig
          let x = 10
          let y = 20
          let z = x + y
          print("Hello from Linux!")
          EOF
          nasm -f elf64 program.asm -o program.o
          gcc -no-pie program.o -o GigLang -lc
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: GigLang-Linux
          path: GigLang

  # ============================================================
  #  macOS (Intel + Apple Silicon)
  # ============================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: brew install nasm gcc
      - name: Build
        shell: bash
        run: |
          cat << 'EOF' > main.gig
          let x = 10
          let y = 20
          let z = x + y
          print("Hello from macOS!")
          EOF
          nasm -f macho64 program.asm -o program.o
          gcc -no-pie program.o -o GigLang -lc
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: GigLang-macOS
          path: GigLang

  # ============================================================
  #  ANDROID ARMv7 (32-bit)
  # ============================================================
  build-android-armv7:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java + SDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;26.3.11579264" "build-tools;34.0.0"
      - name: Build
        shell: bash
        run: |
          cat << 'EOF' > main.gig
          let x = 10
          let y = 20
          let z = x + y
          print("Hello from Android!")
          EOF
          arm-linux-gnueabihf-gcc -static -march=armv7-a program.s -o GigLang_Android_ARMv7 -lc
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: GigLang-Android-ARMv7
          path: GigLang_Android_ARMv7

  # ============================================================
  #  ANDROID ARM64 (64-bit)
  # ============================================================
  build-android-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java + SDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;26.3.11579264" "build-tools;34.0.0"
      - name: Build
        shell: bash
        run: |
          cat << 'EOF' > main.gig
          let x = 10
          let y = 20
          let z = x + y
          print("Hello from Android 64-bit!")
          EOF
          aarch64-linux-gnu-gcc -static program.s -o GigLang_Android_ARM64 -lc
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: GigLang-Android-ARM64
          path: GigLang_Android_ARM64

  # ============================================================
  #  AURORA OS (ARMv7)
  # ============================================================
  build-aurora:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: sudo apt-get install -y gcc-arm-linux-gnueabihf
      - name: Build
        shell: bash
        run: |
          cat << 'EOF' > main.gig
          let x = 10
          let y = 20
          let z = x + y
          print("Hello from Aurora OS!")
          EOF
          arm-linux-gnueabihf-gcc -static program.s -o GigLang_Aurora -lc
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: GigLang-Aurora
          path: GigLang_Aurora

  # ============================================================
  #  PYCRASH (ARMv7)
  # ============================================================
  build-pycrash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: sudo apt-get install -y gcc-arm-linux-gnueabihf
      - name: Build
        shell: bash
        run: |
          cat << 'EOF' > main.gig
          let x = 10
          let y = 20
          let z = x + y
          print("Hello from PyCrash!")
          EOF
          arm-linux-gnueabihf-gcc -static program.s -o GigLang_PyCrash -lc
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: GigLang-PyCrash
          path: GigLang_PyCrash

  # ============================================================
  #  УНИВЕРСАЛЬНЫЙ ПАКЕТ
  # ============================================================
  create-release:
    needs: [build-windows, build-linux, build-macos, build-android-armv7, build-android-arm64, build-aurora, build-pycrash]
    runs-on: ubuntu-latest
    steps:
      - name: Download all
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Package
        run: |
          mkdir GigLang
          cp artifacts/GigLang-Windows/GigLang.exe GigLang/
          cp artifacts/GigLang-Linux/GigLang GigLang/
          cp artifacts/GigLang-macOS/GigLang GigLang/GigLang-macOS
          cp artifacts/GigLang-Android-ARMv7/GigLang_Android_ARMv7 GigLang/
          cp artifacts/GigLang-Android-ARM64/GigLang_Android_ARM64 GigLang/
          cp artifacts/GigLang-Aurora/GigLang_Aurora GigLang/
          cp artifacts/GigLang-PyCrash/GigLang_PyCrash GigLang/
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: GigLang-Universal
          path: GigLang
