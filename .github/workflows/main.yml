name: CubicLang Compiler and Builder

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Environment
      uses: android-actions/setup-android@v3
    - run: sdkmanager "platforms;android-34" "build-tools;34.0.0"
    - uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Create Transpiler
      run: |
        cat << 'EOF' > transpiler.py
        import os, re
        def compile_cubic(file_path):
            if not os.path.exists(file_path): return ""
            with open(file_path, 'r', encoding='utf-8') as f: lines = f.readlines()
            cpp_code = ""
            for line in lines:
                line = line.strip()
                if not line or line.startswith("#"): continue
                parts = re.findall(r'(?:[^\s"]|"(?:\\.|[^"])*")+', line)
                if not parts: continue
                cmd = parts[0]
                try:
                    if cmd == "background":
                        cpp_code += f"glClearColor({parts[1]}, {parts[2]}, {parts[3]}, 1.0f); glClear(GL_COLOR_BUFFER_BIT);\n"
                    elif cmd == "rect":
                        cpp_code += f"drawRect({parts[1]}, {parts[2]}, {parts[3]}, {parts[4]}, {parts[5]}, {parts[6]}, {parts[7]});\n"
                    elif cmd == "button":
                        txt = parts[1]; x, y, w = parts[2], parts[3], parts[4]
                        h = parts[5] if len(parts) > 5 else "100.0f"
                        cpp_code += f"drawButton({txt}, {x}, {y}, {w}, {h});\n"
                except: pass
            return cpp_code

        logic = compile_cubic('main.cubic')
        template = """
        #include <android_native_app_glue.h>
        #include <GLES2/gl2.h>
        #include <EGL/egl.h>
        #include <android/looper.h>
        extern "C" {
            void drawRect(float x, float y, float w, float h, float r, float g, float b) {}
            void drawButton(const char* t, float x, float y, float w, float h) {}
            void android_main(struct android_app* state) {
                state->onAppCmd = [](struct android_app* app, int32_t cmd) {
                    if (cmd == APP_CMD_INIT_WINDOW) {
                        EGLDisplay d = eglGetDisplay(EGL_DEFAULT_DISPLAY);
                        eglInitialize(d, NULL, NULL);
                        EGLConfig c; EGLint n;
                        EGLint a[] = { EGL_RENDERABLE_TYPE, EGL_OPENGL_ES2_BIT, EGL_BLUE_SIZE, 8, EGL_GREEN_SIZE, 8, EGL_RED_SIZE, 8, EGL_NONE };
                        eglChooseConfig(d, a, &c, 1, &n);
                        EGLSurface s = eglCreateWindowSurface(d, c, app->window, NULL);
                        EGLContext ctx = eglCreateContext(d, c, NULL, new EGLint[3]{EGL_CONTEXT_CLIENT_VERSION, 2, EGL_NONE});
                        eglMakeCurrent(d, s, s, ctx);
                    }
                };
                while (1) {
                    int i, e; struct android_poll_source* src;
                    while ((i = ALooper_pollOnce(0, NULL, &e, (void**)&src)) >= 0) {
                        if (src != NULL) src->process(state, src);
                        if (state->destroyRequested != 0) return;
                    }
                    if (state->window != NULL) {
                        {LOGIC}
                        eglSwapBuffers(eglGetDisplay(EGL_DEFAULT_DISPLAY), eglGetCurrentSurface(EGL_READ));
                    }
                }
            }
        }
        """.replace("{LOGIC}", logic)
        with open("generated_main.cpp", "w") as f: f.write(template)
        EOF
        python3 transpiler.py

    - name: Build Libraries
      run: |
        TC=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin
        GLUE=$ANDROID_NDK_ROOT/sources/android/native_app_glue
        FLAGS="-shared -fPIC -I$GLUE -landroid -llog -lGLESv2 -lEGL"
        
        # Компилируем для arm64-v8a
        $TC/aarch64-linux-android24-clang -c $GLUE/android_native_app_glue.c -o glue64.o -I$GLUE
        $TC/aarch64-linux-android24-clang++ generated_main.cpp glue64.o $FLAGS -o libmain64.so

        # Компилируем для armeabi-v7a
        $TC/armv7a-linux-androideabi24-clang -c $GLUE/android_native_app_glue.c -o glue32.o -I$GLUE
        $TC/armv7a-linux-androideabi24-clang++ generated_main.cpp glue32.o $FLAGS -o libmain32.so

    - name: Final Packaging (Android 14 strict)
      run: |
        mkdir -p staging/lib/arm64-v8a staging/lib/armeabi-v7a
        cp libmain64.so staging/lib/arm64-v8a/libmain.so
        cp libmain32.so staging/lib/armeabi-v7a/libmain.so
        
        # Манифест с полными требованиями Android 14
        cat << 'EOF' > AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.cubic.game" android:versionCode="1" android:versionName="1.0">
            <uses-sdk android:minSdkVersion="24" android:targetSdkVersion="34" />
            <application android:label="CubicBattleX" android:hasCode="false" android:extractNativeLibs="true">
                <activity android:name="android.app.NativeActivity" 
                          android:configChanges="orientation|keyboardHidden|screenSize|screenLayout"
                          android:exported="true">
                    <meta-data android:name="android.app.lib_name" android:value="main" />
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        BT=$ANDROID_HOME/build-tools/34.0.0
        
        # 1. Упаковка без сжатия библиотек (важно для Android 14)
        $BT/aapt package -f -M AndroidManifest.xml -I $ANDROID_HOME/platforms/android-34/android.jar -F unsorted.apk staging/
        
        # 2. Выравнивание
        $BT/zipalign -p -f -v 4 unsorted.apk aligned.apk
        
        # 3. Генерация ключа (если нет)
        keytool -genkey -v -keystore my.keystore -alias cubic -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Cubic,O=Dev,C=US" -storepass 123456 -keypass 123456 || true
        
        # 4. Подпись всеми схемами (V1, V2, V3, V4 - критично для Android 14)
        $BT/apksigner sign --ks my.keystore --ks-pass pass:123456 --ks-key-alias cubic --out CubicBattleX.apk aligned.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CubicBattleX-Android14
        path: CubicBattleX.apk
