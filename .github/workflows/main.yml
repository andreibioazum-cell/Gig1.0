name: Gig 1.0 & Firebase Builder

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Environment
      uses: android-actions/setup-android@v3
    - run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
    - uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Create Transpiler and Java Wrapper
      run: |
        cat << 'EOF' > transpiler.py
        import os, re

        def compile_gig(file_path):
            if not os.path.exists(file_path): return ""
            with open(file_path, 'r', encoding='utf-8') as f: lines = f.readlines()

            output_lines = []
            for line in lines:
                line_str = line.strip()
                line_str = re.sub(r'#.*', '', line_str).strip()
                if not line_str:
                    output_lines.append(line)
                    continue
                
                processed_line = line
                if not line_str.endswith('{') and not line_str.endswith('}') and not line_str.endswith(';') and not line_str.startswith('if') and not line_str.startswith('while') and not line_str.startswith('else') and not line_str.startswith('event '):
                    processed_line = line.replace('\n', '').rstrip() + ';\n'
                
                output_lines.append(processed_line)

            content = "".join(output_lines)
            content = re.sub(r'#.*', '', content)

            content = re.sub(r'\bvar\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*(".*?"|\'[^\']*\')', r'std::string \1 = \2', content)
            content = re.sub(r'\bvar\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*([0-9.-]+)', r'float \1 = \2', content)
            content = re.sub(r'\bvar\s+', r'auto ', content)

            content = re.sub(r'\bevent\s+init\s*\(\s*\)\s*\{', r'void game_init() {', content)
            content = re.sub(r'\bevent\s+update\s*\(\s*\)\s*\{', r'void game_update() {', content)
            content = re.sub(r'\bevent\s+draw_hud\s*\(\s*\)\s*\{', r'void game_draw_hud() {', content)
            content = re.sub(r'\bevent\s+on_touch\s*\(\s*([^,)]+)\s*,\s*([^)]+)\s*\)\s*\{', r'void game_on_touch(float \1, float \2) {', content)
            content = re.sub(r'\bevent\s+on_key\s*\(\s*([^)]+)\s*\)\s*\{', r'void game_on_key(std::string \1) {', content)

            content = re.sub(r'background\(([^,]+),\s*([^,]+),\s*([^)]+)\)', r'g_bgR=\1; g_bgG=\2; g_bgB=\3;', content)
            content = re.sub(r'draw_rect\(([^,]+),\s*([^,]+),\s*([^,]+),\s*([^,]+),\s*([^,]+),\s*([^,]+),\s*([^)]+)\)', r'drawHudRect(\1, \2, \3, \4, \5, \6, \7);', content)
            content = re.sub(r'draw_circle\(([^,]+),\s*([^,]+),\s*([^,]+),\s*([^,]+),\s*([^,]+),\s*([^)]+)\)', r'drawCircle2D(\1, \2, \3, \4, \5, \6);', content)
            content = re.sub(r'draw_button\(([^,]+),\s*([^,]+),\s*([^,]+),\s*([^,]+),\s*([^,]+),\s*([^)]+)\)', r'drawButton(\2, \3, \4, \5, \6);', content)
            content = re.sub(r'draw_text\(([^,]+),\s*([^,]+),\s*([^,]+),\s*([^,]+),\s*([^,]+),\s*([^,]+),\s*([^)]+)\)', r'drawHudText(\1, \2, \3, \4, \5, \6, \7);', content)

            content = re.sub(r'open_keyboard\(\)', r'show_keyboard(state_global);', content)
            content = re.sub(r'string_pop\(([^)]+)\)', r'string_pop_helper(\1)', content)
            content = re.sub(r'string_push\(([^,]+),\s*([^)]+)\)', r'string_push_helper(\1, \2)', content)

            content = re.sub(r'fb_init\(([^,]+),\s*([^)]+)\)', r'call_fb_init(state_global->activity, \1, \2);', content)
            content = re.sub(r'fb_register\(([^,]+),\s*([^)]+)\)', r'call_fb_auth(state_global->activity, \1, \2, true);', content)
            content = re.sub(r'fb_login\(([^,]+),\s*([^)]+)\)', r'call_fb_auth(state_global->activity, \1, \2, false);', content)
            content = re.sub(r'fb_db_set\(([^,]+),\s*([^)]+)\)', r'call_fb_db_set(state_global->activity, \1, \2);', content)
            content = re.sub(r'fb_db_get\(([^)]+)\)', r'call_fb_db_get(state_global->activity, \1);', content)
            content = re.sub(r'fb_get_auth_status\(\)', r'get_fb_auth_status(state_global->activity)', content)
            content = re.sub(r'fb_get_db_status\(\)', r'get_fb_db_status(state_global->activity)', content)
            content = re.sub(r'fb_get_db_value\(\)', r'get_fb_db_value(state_global->activity)', content)

            content = re.sub(r'(".*?")\s*\+\s*([a-zA-Z0-9_().]+)', r'(to_str(\1) + to_str(\2))', content)
            content = re.sub(r'([a-zA-Z0-9_().]+)\s*\+\s*(".*?")', r'(to_str(\1) + to_str(\2))', content)

            content = re.sub(r'sqrt\(([^)]+)\)', r'sqrtf(\1)', content)
            content = content.replace(';;', ';')

            return content

        logic = compile_gig('main.gig')

        template = """
        #include <android_native_app_glue.h>
        #include <android/input.h>
        #include <GLES2/gl2.h>
        #include <EGL/egl.h>
        #include <math.h>
        #include <stdlib.h>
        #include <stdio.h>
        #include <string.h>
        #include <string>
        #include <sstream>

        static struct android_app* state_global = nullptr;

        template<typename T>
        std::string to_str(const T& val) {
            std::ostringstream ss;
            ss << val;
            return ss.str();
        }
        inline std::string to_str(float val) {
            if (val == (int)val) return std::to_string((int)val);
            return std::to_string(val);
        }
        inline std::string to_str(const std::string& val) { return val; }
        inline std::string to_str(const char* val) { return std::string(val); }

        static const unsigned char g_font[39][8] = {
            {0x3C,0x66,0x6E,0x7E,0x76,0x66,0x3C,0x00}, {0x18,0x18,0x38,0x18,0x18,0x18,0x7E,0x00},
            {0x3C,0x66,0x06,0x0E,0x30,0x60,0x7E,0x00}, {0x3C,0x66,0x06,0x1C,0x06,0x66,0x3C,0x00},
            {0x0C,0x1C,0x3C,0x6C,0x7E,0x0C,0x0C,0x00}, {0x7E,0x60,0x7C,0x06,0x06,0x66,0x3C,0x00},
            {0x3C,0x66,0x60,0x7C,0x66,0x66,0x3C,0x00}, {0x7E,0x66,0x06,0x0C,0x18,0x18,0x18,0x00},
            {0x3C,0x66,0x66,0x3C,0x66,0x66,0x3C,0x00}, {0x3C,0x66,0x66,0x3E,0x06,0x66,0x3C,0x00},
            {0x18,0x3C,0x66,0x66,0x7E,0x66,0x66,0x00}, {0x7C,0x66,0x66,0x7C,0x60,0x60,0x60,0x00},
            {0x3C,0x66,0x60,0x60,0x60,0x66,0x3C,0x00}, {0x78,0x6C,0x66,0x66,0x66,0x6C,0x78,0x00},
            {0x7E,0x60,0x60,0x7C,0x60,0x60,0x7E,0x00}, {0x7E,0x60,0x60,0x7C,0x60,0x60,0x60,0x00},
            {0x3E,0x60,0x60,0x6E,0x66,0x66,0x3E,0x00}, {0x66,0x66,0x66,0x7E,0x66,0x66,0x66,0x00},
            {0x3C,0x18,0x18,0x18,0x18,0x18,0x3C,0x00}, {0x1E,0x0C,0x0C,0x0C,0x0C,0xCC,0x78,0x00},
            {0x66,0x6C,0x78,0x70,0x78,0x6C,0x66,0x00}, {0x60,0x60,0x60,0x60,0x60,0x60,0x7E,0x00},
            {0x63,0x77,0x7F,0x6B,0x63,0x63,0x63,0x00}, {0x66,0x76,0x7E,0x7E,0x6E,0x66,0x66,0x00},
            {0x3C,0x66,0x66,0x66,0x66,0x66,0x3C,0x00}, {0x7C,0x66,0x66,0x7C,0x60,0x60,0x60,0x00},
            {0x3C,0x66,0x66,0x66,0x6E,0x3C,0x0E,0x00}, {0x7C,0x66,0x66,0x7C,0x78,0x6C,0x66,0x00},
            {0x3C,0x66,0x30,0x18,0x0C,0x66,0x3C,0x00}, {0x7E,0x5A,0x18,0x18,0x18,0x18,0x18,0x00},
            {0x66,0x66,0x66,0x66,0x66,0x66,0x3C,0x00}, {0x66,0x66,0x66,0x66,0x66,0x3C,0x18,0x00},
            {0x63,0x63,0x63,0x6B,0x7F,0x77,0x63,0x00}, {0x66,0x66,0x3C,0x18,0x3C,0x66,0x66,0x00},
            {0x66,0x66,0x66,0x3C,0x18,0x18,0x18,0x00}, {0x7E,0x06,0x0C,0x18,0x30,0x60,0x7E,0x00},
            {0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00}, {0x00,0x00,0x00,0x3E,0x00,0x00,0x00,0x00}
        };

        static GLuint s_program = 0;
        static GLint s_pos_loc = -1;
        static GLint s_col_loc = -1;
        static int g_scr_w = 1080;
        static int g_scr_h = 2400;
        static float g_bgR = 0.12f, g_bgG = 0.15f, g_bgB = 0.22f;

        float ndcX(float x) { return (x / 1080.0f) * 2.0f - 1.0f; }
        float ndcY(float y) { return 1.0f - (y / 1920.0f) * 2.0f; }

        std::string string_pop_helper(std::string str) {
            if (str.empty()) return "";
            return str.substr(0, str.length() - 1);
        }

        std::string string_push_helper(std::string str, std::string addition) {
            return str + addition;
        }

        void call_fb_init(ANativeActivity* activity, std::string url, std::string key) {
            JNIEnv* env = nullptr;
            activity->vm->AttachCurrentThread(&env, nullptr);
            jclass clazz = env->GetObjectClass(activity->clazz);
            jmethodID method = env->GetStaticMethodID(clazz, "fb_init", "(Ljava/lang/String;Ljava/lang/String;)V");
            jstring jurl = env->NewStringUTF(url.c_str());
            jstring jkey = env->NewStringUTF(key.c_str());
            env->CallStaticVoidMethod(clazz, method, jurl, jkey);
            env->DeleteLocalRef(jurl); env->DeleteLocalRef(jkey);
            activity->vm->DetachCurrentThread();
        }

        void call_fb_auth(ANativeActivity* activity, std::string nick, std::string pass, bool isRegister) {
            JNIEnv* env = nullptr;
            activity->vm->AttachCurrentThread(&env, nullptr);
            jclass clazz = env->GetObjectClass(activity->clazz);
            jmethodID method = env->GetStaticMethodID(clazz, "fb_auth", "(Ljava/lang/String;Ljava/lang/String;Z)V");
            jstring jnick = env->NewStringUTF(nick.c_str());
            jstring jpass = env->NewStringUTF(pass.c_str());
            env->CallStaticVoidMethod(clazz, method, jnick, jpass, isRegister);
            env->DeleteLocalRef(jnick); env->DeleteLocalRef(jpass);
            activity->vm->DetachCurrentThread();
        }

        void call_fb_db_set(ANativeActivity* activity, std::string path, float score) {
            JNIEnv* env = nullptr;
            activity->vm->AttachCurrentThread(&env, nullptr);
            jclass clazz = env->GetObjectClass(activity->clazz);
            jmethodID method = env->GetStaticMethodID(clazz, "fb_db_set", "(Ljava/lang/String;F)V");
            jstring jpath = env->NewStringUTF(path.c_str());
            env->CallStaticVoidMethod(clazz, method, jpath, score);
            env->DeleteLocalRef(jpath);
            activity->vm->DetachCurrentThread();
        }

        void call_fb_db_get(ANativeActivity* activity, std::string path) {
            JNIEnv* env = nullptr;
            activity->vm->AttachCurrentThread(&env, nullptr);
            jclass clazz = env->GetObjectClass(activity->clazz);
            jmethodID method = env->GetStaticMethodID(clazz, "fb_db_get", "(Ljava/lang/String;)V");
            jstring jpath = env->NewStringUTF(path.c_str());
            env->CallStaticVoidMethod(clazz, method, jpath);
            env->DeleteLocalRef(jpath);
            activity->vm->DetachCurrentThread();
        }

        std::string get_fb_auth_status(ANativeActivity* activity) {
            JNIEnv* env = nullptr;
            activity->vm->AttachCurrentThread(&env, nullptr);
            jclass clazz = env->GetObjectClass(activity->clazz);
            jmethodID method = env->GetStaticMethodID(clazz, "getAuthStatus", "()Ljava/lang/String;");
            jstring jres = (jstring)env->CallStaticObjectMethod(clazz, method);
            const char* res = env->GetStringUTFChars(jres, nullptr);
            std::string ret(res);
            env->ReleaseStringUTFChars(jres, res);
            activity->vm->DetachCurrentThread();
            return ret;
        }

        std::string get_fb_db_status(ANativeActivity* activity) {
            JNIEnv* env = nullptr;
            activity->vm->AttachCurrentThread(&env, nullptr);
            jclass clazz = env->GetObjectClass(activity->clazz);
            jmethodID method = env->GetStaticMethodID(clazz, "getDbStatus", "()Ljava/lang/String;");
            jstring jres = (jstring)env->CallStaticObjectMethod(clazz, method);
            const char* res = env->GetStringUTFChars(jres, nullptr);
            std::string ret(res);
            env->ReleaseStringUTFChars(jres, res);
            activity->vm->DetachCurrentThread();
            return ret;
        }

        float get_fb_db_value(ANativeActivity* activity) {
            JNIEnv* env = nullptr;
            activity->vm->AttachCurrentThread(&env, nullptr);
            jclass clazz = env->GetObjectClass(activity->clazz);
            jmethodID method = env->GetStaticMethodID(clazz, "getDbValue", "()F");
            jfloat val = env->CallStaticFloatMethod(clazz, method);
            activity->vm->DetachCurrentThread();
            return val;
        }

        void show_keyboard(struct android_app* state) {
            ANativeActivity_showSoftInput(state->activity, ANATIVEACTIVITY_SHOW_SOFT_INPUT_FORCED);
        }

        void initShaders() {
            if (s_program != 0) return;
            const char* vs = 
                "attribute vec4 a_pos;\\n"
                "attribute vec4 a_color;\\n"
                "varying vec4 v_color;\\n"
                "void main() {\\n"
                "  gl_Position = a_pos;\\n"
                "  v_color = a_color;\\n"
                "}\\n";
            const char* fs = 
                "precision mediump float;\\n"
                "varying vec4 v_color;\\n"
                "void main() {\\n"
                "  gl_FragColor = v_color;\\n"
                "}\\n";
            
            GLuint vsh = glCreateShader(GL_VERTEX_SHADER);
            glShaderSource(vsh, 1, &vs, nullptr); glCompileShader(vsh);
            GLuint fsh = glCreateShader(GL_FRAGMENT_SHADER);
            glShaderSource(fsh, 1, &fs, nullptr); glCompileShader(fsh);
            
            s_program = glCreateProgram();
            glAttachShader(s_program, vsh); glAttachShader(s_program, fsh);
            glLinkProgram(s_program);
            
            s_pos_loc = glGetAttribLocation(s_program, "a_pos");
            s_col_loc = glGetAttribLocation(s_program, "a_color");
        }

        void drawHudRect(float px, float py, float pw, float ph, float r, float g, float b) {
            initShaders(); glUseProgram(s_program);

            float x1 = ndcX(px); float y1 = ndcY(py);
            float x2 = ndcX(px + pw); float y2 = ndcY(py + ph);

            float v[] = { x1, y1, 0,  x2, y1, 0,  x2, y2, 0,  x1, y1, 0,  x2, y2, 0,  x1, y2, 0 };
            float c[24];
            for (int i=0; i<6; ++i) { c[i*4]=r; c[i*4+1]=g; c[i*4+2]=b; c[i*4+3]=1.0f; }

            glEnableVertexAttribArray(s_pos_loc);
            glVertexAttribPointer(s_pos_loc, 3, GL_FLOAT, GL_FALSE, 0, v);
            glEnableVertexAttribArray(s_col_loc);
            glVertexAttribPointer(s_col_loc, 4, GL_FLOAT, GL_FALSE, 0, c);
            glDrawArrays(GL_TRIANGLES, 0, 6);
        }

        void drawCircle2D(float cx, float cy, float radius, float r, float g, float b) {
            initShaders(); glUseProgram(s_program);

            float v[34 * 3]; float c[34 * 4];
            v[0] = ndcX(cx); v[1] = ndcY(cy); v[2] = 0.0f;
            c[0] = r; c[1] = g; c[2] = b; c[3] = 1.0f;

            for (int i = 0; i <= 32; i++) {
                float angle = i * 2.0f * 3.14159f / 32.0f;
                v[(i+1)*3] = ndcX(cx + cosf(angle) * radius);
                v[(i+1)*3+1] = ndcY(cy + sinf(angle) * radius);
                v[(i+1)*3+2] = 0.0f;
                c[(i+1)*4] = r; c[(i+1)*4+1] = g; c[(i+1)*4+2] = b; c[(i+1)*4+3] = 1.0f;
            }

            glEnableVertexAttribArray(s_pos_loc);
            glVertexAttribPointer(s_pos_loc, 3, GL_FLOAT, GL_FALSE, 0, v);
            glEnableVertexAttribArray(s_col_loc);
            glVertexAttribPointer(s_col_loc, 4, GL_FLOAT, GL_FALSE, 0, c);
            glDrawArrays(GL_TRIANGLE_FAN, 0, 34);
        }

        void drawHudText(std::string text, float tx, float ty, float scale, float r, float g, float b) {
            float curX = tx;
            for (size_t i = 0; i < text.length(); ++i) {
                char c = text[i];
                int charIdx = 36;
                if (c >= '0' && c <= '9') charIdx = c - '0';
                else if (c >= 'A' && c <= 'Z') charIdx = 10 + (c - 'A');
                else if (c >= 'a' && c <= 'z') charIdx = 10 + (c - 'a');
                else if (c == '-') charIdx = 37;

                for (int row = 0; row < 8; ++row) {
                    unsigned char rowVal = g_font[charIdx][row];
                    for (int col = 0; col < 8; ++col) {
                        if (rowVal & (1 << (7 - col))) {
                            drawHudRect(curX + col * scale, ty + row * scale, scale, scale, r, g, b);
                        }
                    }
                }
                curX += 9 * scale;
            }
        }

        void drawButton(std::string title, float x, float y, float w, float h) {
            drawHudRect(x, y, w, h, 0.2f, 0.2f, 0.28f);
            drawHudText(title, x + w/2.0f - (title.length()*4.5f*3.0f), y + h/2.0f - 12.0f, 3.0f, 1.0f, 1.0f, 1.0f);
        }

        {LOGIC}

        static int32_t handle_input(struct android_app* app, AInputEvent* event) {
            int type = AInputEvent_getType(event);
            if (type == AINPUT_EVENT_TYPE_MOTION) {
                int action = AMotionEvent_getAction(event) & AMOTION_EVENT_ACTION_MASK;
                if (action == AMOTION_EVENT_ACTION_DOWN) {
                    float tx = AMotionEvent_getX(event, 0);
                    float ty = AMotionEvent_getY(event, 0);
                    float vx = (tx / (float)g_scr_w) * 1080.0f;
                    float vy = (ty / (float)g_scr_h) * 1920.0f;
                    game_on_touch(vx, vy);
                    return 1;
                }
            }
            else if (type == AINPUT_EVENT_TYPE_KEY) {
                int action = AKeyEvent_getAction(event);
                if (action == AKEY_EVENT_ACTION_DOWN) {
                    int key = AKeyEvent_getKeyCode(event);
                    std::string charKey = "";
                    if (key >= AKEYCODE_A && key <= AKEYCODE_Z) {
                        char buf[2] = { (char)('A' + (key - AKEYCODE_A)), '\\0' };
                        charKey = buf;
                    } else if (key >= AKEYCODE_0 && key <= AKEYCODE_9) {
                        char buf[2] = { (char)('0' + (key - AKEYCODE_0)), '\\0' };
                        charKey = buf;
                    } else if (key == AKEYCODE_DEL) {
                        charKey = "BACKSPACE";
                    } else if (key == AKEYCODE_AT) {
                        charKey = "@";
                    } else if (key == AKEYCODE_PERIOD) {
                        charKey = ".";
                    }
                    if (!charKey.empty()) {
                        game_on_key(charKey);
                        return 1;
                    }
                }
            }
            return 0;
        }

        void android_main(struct android_app* state) {
            state_global = state;
            state->onInputEvent = handle_input;

            EGLDisplay d = eglGetDisplay(EGL_DEFAULT_DISPLAY);
            eglInitialize(d, nullptr, nullptr);
            EGLConfig cfg; EGLint n;
            EGLint attrs[] = { EGL_RENDERABLE_TYPE, EGL_OPENGL_ES2_BIT, EGL_BLUE_SIZE, 8, EGL_GREEN_SIZE, 8, EGL_RED_SIZE, 8, EGL_NONE };
            eglChooseConfig(d, attrs, &cfg, 1, &n);
            EGLContext ctx = eglCreateContext(d, cfg, nullptr, new EGLint[3]{EGL_CONTEXT_CLIENT_VERSION, 2, EGL_NONE});
            EGLSurface s = EGL_NO_SURFACE;

            game_init();

            while (1) {
                int id, ev; struct android_poll_source* src;
                while ((id = ALooper_pollOnce(state->window ? 0 : -1, nullptr, &ev, (void**)&src)) >= 0) {
                    if (src) src->process(state, src);
                    if (state->destroyRequested) return;
                }

                if (state->window && s == EGL_NO_SURFACE) {
                    s = eglCreateWindowSurface(d, cfg, state->window, nullptr);
                    eglMakeCurrent(d, s, s, ctx);
                    g_scr_w = ANativeWindow_getWidth(state->window);
                    g_scr_h = ANativeWindow_getHeight(state->window);
                    glViewport(0, 0, g_scr_w, g_scr_h);
                }

                if (s != EGL_NO_SURFACE) {
                    glClearColor(g_bgR, g_bgG, g_bgB, 1.0f);
                    glClear(GL_COLOR_BUFFER_BIT);

                    game_update();
                    game_draw_hud();

                    eglSwapBuffers(d, s);
                }
            }
        }
        """.replace("{LOGIC}", logic)

        with open("generated_main.cpp", "w") as f: f.write(template)
        EOF
        python3 transpiler.py

    - name: Create Native Java Firebase Helper
      run: |
        mkdir -p com/gig/game
        cat << 'EOF' > com/gig/game/MainActivity.java
        package com.gig.game;
        import android.app.NativeActivity;
        import android.os.Bundle;
        import android.view.WindowManager;
        import java.io.*;
        import java.net.*;

        public class MainActivity extends NativeActivity {
            public static String dbUrl = "";
            public static String apiKey = "";
            public static volatile String authStatus = "IDLE";
            public static volatile String dbStatus = "IDLE";
            public static volatile float dbValue = 0.0f;

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
            }

            static { System.loadLibrary("main"); }

            public static void fb_init(String url, String key) {
                dbUrl = url;
                apiKey = key;
                authStatus = "READY";
            }

            public static void fb_auth(final String nickname, final String password, final boolean isRegister) {
                authStatus = "PENDING";
                new Thread() {
                    public void run() {
                        try {
                            String cleanNick = nickname.replaceAll("[^a-zA-Z0-9]", "");
                            String email = cleanNick.toLowerCase() + "@gigapp.com";
                            String endpoint = isRegister ? "signUp" : "signInWithPassword";
                            URL url = new URL("https://identitytoolkit.googleapis.com/v1/accounts:" + endpoint + "?key=" + apiKey);
                            HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                            conn.setRequestMethod("POST");
                            conn.setRequestProperty("Content-Type", "application/json");
                            conn.setDoOutput(true);
                            String body = "{\"email\":\"" + email + "\",\"password\":\"" + password + "\",\"returnSecureToken\":true}";
                            OutputStream os = conn.getOutputStream();
                            os.write(body.getBytes("utf-8"));
                            os.close();
                            authStatus = conn.getResponseCode() == 200 ? "SUCCESS" : "ERROR: " + conn.getResponseCode();
                        } catch (Exception e) {
                            authStatus = "FAIL";
                        }
                    }
                }.start();
            }

            public static void fb_db_set(final String path, final float score) {
                dbStatus = "SENDING";
                new Thread() {
                    public void run() {
                        try {
                            URL url = new URL(dbUrl + "/" + path + ".json");
                            HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                            conn.setRequestMethod("PUT");
                            conn.setRequestProperty("Content-Type", "application/json");
                            conn.setDoOutput(true);
                            OutputStream os = conn.getOutputStream();
                            os.write(String.valueOf(score).getBytes("utf-8"));
                            os.close();
                            dbStatus = conn.getResponseCode() == 200 ? "SAVED" : "FAIL: " + conn.getResponseCode();
                        } catch (Exception e) {
                            dbStatus = "ERROR";
                        }
                    }
                }.start();
            }

            public static void fb_db_get(final String path) {
                dbStatus = "LOADING";
                new Thread() {
                    public void run() {
                        try {
                            URL url = new URL(dbUrl + "/" + path + ".json");
                            HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                            conn.setRequestMethod("GET");
                            if (conn.getResponseCode() == 200) {
                                BufferedReader br = new BufferedReader(new InputStreamReader(conn.getInputStream()));
                                StringBuilder sb = new StringBuilder();
                                String line;
                                while ((line = br.readLine()) != null) sb.append(line);
                                br.close();
                                try {
                                    dbValue = Float.parseFloat(sb.toString().trim());
                                    dbStatus = "SUCCESS";
                                } catch (Exception e) {
                                    dbValue = 0;
                                    dbStatus = "EMPTY";
                                }
                            } else {
                                dbStatus = "FAIL: " + conn.getResponseCode();
                            }
                        } catch (Exception e) {
                            dbStatus = "ERROR";
                        }
                    }
                }.start();
            }

            public static String getAuthStatus() { return authStatus; }
            public static String getDbStatus() { return dbStatus; }
            public static float getDbValue() { return dbValue; }
        }
        EOF

    - name: Build Libraries (All ABIs)
      run: |
        TC=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin
        GLUE=$ANDROID_NDK_ROOT/sources/android/native_app_glue
        FLAGS="-shared -fPIC -I$GLUE -landroid -llog -lGLESv2 -lEGL -static-libstdc++"
        
        $TC/aarch64-linux-android24-clang -c $GLUE/android_native_app_glue.c -o glue64.o -I$GLUE
        $TC/aarch64-linux-android24-clang++ generated_main.cpp glue64.o $FLAGS -o libmain64.so
        
        $TC/armv7a-linux-androideabi24-clang -c $GLUE/android_native_app_glue.c -o glue32.o -I$GLUE
        $TC/armv7a-linux-androideabi24-clang++ generated_main.cpp glue32.o $FLAGS -o libmain32.so

    - name: Compile Java to DEX
      run: |
        javac -source 8 -target 8 -d . -classpath $ANDROID_HOME/platforms/android-34/android.jar com/gig/game/MainActivity.java
        $ANDROID_HOME/build-tools/34.0.0/d8 com/gig/game/*.class --lib $ANDROID_HOME/platforms/android-34/android.jar --output .

    - name: Assemble APK
      run: |
        mkdir -p staging/lib/arm64-v8a staging/lib/armeabi-v7a
        cp libmain64.so staging/lib/arm64-v8a/libmain.so
        cp libmain32.so staging/lib/armeabi-v7a/libmain.so
        cp classes.dex staging/
        
        cat << 'EOF' > AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.gig.game">
            <uses-sdk android:minSdkVersion="24" android:targetSdkVersion="34" />
            <uses-permission android:name="android.permission.INTERNET" />
            <application android:label="Gig 1.0" android:hasCode="true" android:extractNativeLibs="true">
                <activity android:name=".MainActivity"
                          android:configChanges="orientation|keyboardHidden|screenSize"
                          android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        BT=$ANDROID_HOME/build-tools/34.0.0
        $BT/aapt package -f -M AndroidManifest.xml -I $ANDROID_HOME/platforms/android-34/android.jar -F unsorted.apk staging/
        $BT/zipalign -p -f -v 4 unsorted.apk aligned.apk
        keytool -genkey -v -keystore my.keystore -alias cubic -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=C" -storepass 123456 -keypass 123456 || true
        $BT/apksigner sign --ks my.keystore --ks-pass pass:123456 --out Gig1.0.apk aligned.apk

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Gig1.0-Firebase-Build
        path: Gig1.0.apk
