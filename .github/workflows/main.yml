name: Gig-Flow Compiler 1.2 (Ultra Fix)

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Create Reliable Transpiler
      run: |
        cat << 'EOF' > compiler.py
        import re

        def transpile(code):
            # 1. Глобальные замены структуры
            code = code.replace("entry game {", 'extern "C" void android_main(struct android_app* state) {')
            code = code.replace("loop {", 'while(1) {')
            
            # 2. Замена var на auto
            code = re.sub(r'\bvar\b', 'auto', code)
            
            # 3. Обработка методов -> на .
            code = code.replace("->", ".")
            
            # 4. Обработка сложения строк (улучшенная)
            code = re.sub(r'(\".*?\")\s*\+\s*(\w+)', r'std::string(\1) + std::to_string(\2)', code)

            # 5. Специфичные замены для API
            code = code.replace("render.clear", "glClearColor")
            code = code.replace("render.drawRect", "draw_rect_with_color")
            code = code.replace("render.text", "draw_ui_text")
            code = code.replace("input.tapped", "check_input_touch")
            code = code.replace("color.Green", '"green"')
            
            # 6. Построчная обработка (добавление ; и очистка)
            final_lines = []
            for line in code.split('\n'):
                stripped = line.strip()
                if not stripped or stripped.endswith('{') or stripped.endswith('}') or stripped.startswith('//') or stripped.startswith('extern'):
                    final_lines.append(line)
                    continue
                
                # Если в строке нет точки с запятой в конце - добавляем
                if not stripped.endswith(';') and not stripped.endswith('{') and not stripped.endswith('}'):
                    line += ';'
                final_lines.append(line)
                
            return "\n".join(final_lines)

        with open('main.gig', 'r') as f:
            gig_source = f.read()

        logic = transpile(gig_source)

        header = """
        #include <android_native_app_glue.h>
        #include <GLES2/gl2.h>
        #include <memory>
        #include <string>

        struct Rect { 
            float x, y, w, h; 
            Rect(float _x, float _y, float _w, float _h) : x(_x), y(_y), w(_w), h(_h) {} 
        };
        
        void draw_rect_with_color(std::shared_ptr<Rect> r, std::string c) {}
        void draw_ui_text(std::string t, float x, float y, float s) {}
        bool check_input_touch(struct android_app* s, std::shared_ptr<Rect> r) { return false; }
        """

        with open("main.cpp", "w") as f:
            f.write(header + logic)
        EOF
        python3 compiler.py

    - name: Compile to Shared Library
      run: |
        TC=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin
        GLUE=$ANDROID_NDK_ROOT/sources/android/native_app_glue
        
        # Компилируем glue (C)
        $TC/aarch64-linux-android24-clang -c $GLUE/android_native_app_glue.c -o glue.o -I$GLUE
        
        # Компилируем основной код (C++)
        $TC/aarch64-linux-android24-clang++ main.cpp glue.o -I$GLUE -shared -fPIC -Ofast -landroid -lGLESv2 -o libmain.so

    - name: Package APK
      run: |
        mkdir -p staging/lib/arm64-v8a && cp libmain.so staging/lib/arm64-v8a/
        cat << 'EOF' > AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.gig.flow">
            <application android:hasCode="false" android:label="Gig Flow 1.2">
                <activity android:name="android.app.NativeActivity" android:exported="true">
                    <meta-data android:name="android.app.lib_name" android:value="main" />
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        $ANDROID_HOME/build-tools/34.0.0/aapt package -f -M AndroidManifest.xml -I $ANDROID_HOME/platforms/android-34/android.jar -F unsorted.apk staging/
        keytool -genkey -v -keystore k.keystore -alias g -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=G" -storepass 123456 -keypass 123456 || true
        $ANDROID_HOME/build-tools/34.0.0/apksigner sign --ks k.keystore --ks-pass pass:123456 --out GigFlow_1.2.apk unsorted.apk

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Gig-Flow-Fixed-APK
        path: GigFlow_1.2.apk
