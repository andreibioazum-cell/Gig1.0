name: Gig-Flow

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install MinGW
        run: choco install mingw -y
      - name: Create Demo main.gig (if not exists)
        shell: bash
        run: |
          if [ ! -f main.gig ]; then
            cat << 'EOF' > main.gig
            import graphics
            import physics2d
            import audio
            import input
            import ui
            import timer
            import tween
            import storage
            import firebase
            import camera
            import json

            local score = 0
            local highScore = 100
            local isGameOver = 0

            function game_load()
                storage:save("save.dat", "100")
                local loadedScore = storage:load("save.dat")
                
                physics2d:newWorld(0.0, 9.8)
                physics2d:newBody("player", 100, 100, "dynamic")
                
                audio:load("jump", "jump.wav")
                audio:play("jump")
                
                ui:newMenu("main")
                ui:newHUD()
                
                timer:new(1000, "onTimer")
                tween:to("player", 2.0, "x=200")
                
                camera:new()
                camera:follow(100, 100)
                
                local jsonStr = json:encode("score", "100")
                
                firebase:init("https://gig-default-rtdb.firebaseio.com/")
                firebase:put("scores/player1", "100")
                
                print("Game Loaded Successfully")
            end

            function game_update(dt)
                if input:key_pressed("space") then
                    audio:play("jump")
                    score = score + 1
                end
            end

            function game_draw()
                camera:apply()
                graphics:clear(0.1, 0.1, 0.1)
                graphics:draw_rect(0, 500, 800, 100, "green")
                graphics:draw_circle(400, 300, 50, "red")
                graphics:draw_text("Score: " .. score, 10, 30, 20)
                camera:unapply()
            end
          EOF
          fi

      - name: Build C++ Source
        shell: bash
        run: |
          python3 << 'EOF'
          import re

          with open('main.gig', 'r', encoding='utf-8') as f:
              code = f.read()

          # Удаляем комментарии и строки импорта
          code = re.sub(r'--.*$', '', code, flags=re.MULTILINE)
          code = re.sub(r'import\s+\w+', '', code)

          # Переменные (Приведение к типам C++)
          code = re.sub(r'local\s+(\w+)\s*=\s*\{\s*\}', r'std::vector<int> \1;', code)
          code = re.sub(r'local\s+(\w+)\s*=\s*"([^"]*)"', r'const char* \1 = "\2";', code)
          code = re.sub(r'local\s+(\w+)\s*=\s*([^;\n]+)', r'int \1 = \2;', code)

          # Функции
          code = re.sub(r'function\s+(\w+)\s*\(([^)]*)\)', r'void \1(\2) {', code)
          code = re.sub(r'function\s+(\w+):(\w+)\s*\(([^)]*)\)', r'void \1_\2(\3) {', code)
          
          # Вызовы API-методов вида object:method(...) -> object_method(...)
          code = re.sub(r'(\w+):(\w+)\s*\(([^)]*)\)', r'\1_\2(\3)', code)

          code = re.sub(r'end', r'}', code)

          # Вывод текста (print)
          code = re.sub(r'print\s*\(\s*"([^"]*)"\s*\)', r'printf("\1\\n");', code)
          code = re.sub(r'print\s*\(\s*"([^"]*)"\s*\.\.\s*(\w+)\s*\)', r'printf("\1 %d\\n", \2);', code)
          code = re.sub(r'print\s*\(\s*(\w+)\s*\.\.\s*"([^"]*)"\s*\)', r'printf("%d \2\\n", \1);', code)
          code = re.sub(r'print\s*\(\s*"([^"]*)"\s*\.\.\s*"([^"]*)"\s*\)', r'printf("\1\2\\n");', code)

          # Отрисовка текста (graphics.draw_text)
          code = re.sub(r'graphics_draw_text\s*\(\s*"([^"]*)"\s*\.\.\s*(\w+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^)]+)\)',
                        r'printf("\1 %d at %f, %f size %f\\n", \2, (float)\3, (float)\4, (float)\5);', code)
          code = re.sub(r'graphics_draw_text\s*\(\s*"([^"]*)"\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^)]+)\)',
                        r'printf("\1 at %f, %f size %f\\n", (float)\2, (float)\3, (float)\4);', code)

          # Отрисовка примитивов
          code = re.sub(r'graphics_draw_circle\s*\(([^,]+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*"([^"]*)"\s*\)',
                        r'printf("circle at %f, %f radius %f color %s\\n", (float)\1, (float)\2, (float)\3, "\4");', code)
          code = re.sub(r'graphics_draw_rect\s*\(([^,]+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*"([^"]*)"\s*\)',
                        r'printf("rect at %f, %f %fx%f color %s\\n", (float)\1, (float)\2, (float)\3, (float)\4, "\5");', code)
          code = re.sub(r'graphics_clear\s*\(([^,]+)\s*,\s*([^,]+)\s*,\s*([^)]+)\)',
                        r'printf("clear %f %f %f\\n", (float)\1, (float)\2, (float)\3);', code)

          # Математика
          code = re.sub(r'math\.floor\s*\(([^)]+)\)', r'(int)(\1)', code)
          code = re.sub(r'math\.sqrt\s*\(([^)]+)\)', r'sqrt(\1)', code)
          code = re.sub(r'math\.random\s*\(([^)]+)\)', r'(rand() % \1)', code)
          code = re.sub(r'math\.min\s*\(([^,]+)\s*,\s*([^)]+)\)', r'(\1 < \2 ? \1 : \2)', code)
          code = re.sub(r'math\.max\s*\(([^,]+)\s*,\s*([^)]+)\)', r'(\1 > \2 ? \1 : \2)', code)
          code = re.sub(r'math\.abs\s*\(([^)]+)\)', r'abs(\1)', code)

          # Управляющие конструкции
          code = re.sub(r'if\s+([^\n]+)\s+then', r'if (\1) {', code)
          code = re.sub(r'elseif\s+([^\n]+)\s+then', r'} else if (\1) {', code)
          code = re.sub(r'else', r'} else {', code)

          code = re.sub(r'for\s+(\w+)\s*=\s*([^,]+)\s*,\s*([^,]+)\s+do', r'for (int \1 = \2; \1 <= \3; \1++) {', code)
          code = re.sub(r'for\s+(\w+)\s*,\s*(\w+)\s+in\s+pairs\s*\(([^)]+)\)\s+do', r'for (auto \1 : \3) { int \2 = \1;', code)

          code = re.sub(r'while\s+([^\n]+)\s+do', r'while (\1) {', code)
          code = re.sub(r'repeat', r'do {', code)
          code = re.sub(r'until\s+([^\n]+)', r'} while (!(\1));', code)

          code = re.sub(r'return\s+([^;\n]+)', r'return \1;', code)

          # Операции над массивами/таблицами
          code = re.sub(r'table\.insert\s*\(([^,]+)\s*,\s*([^)]+)\)', r'\1.push_back(\2);', code)
          code = re.sub(r'table\.remove\s*\(([^,]+)\s*,\s*([^)]+)\)', r'\1.erase(\1.begin() + \2);', code)
          code = re.sub(r'#(\w+)', r'\1.size()', code)
          code = re.sub(r'(\w+)\[(\w+)\]', r'\1[\2]', code)

          # Логические операторы
          code = re.sub(r'\band\b', r'&&', code)
          code = re.sub(r'\bor\b', r'||', code)
          code = re.sub(r'\bnot\b', r'!', code)

          lines = []
          for line in code.split('\n'):
              line = line.strip()
              if line and not line.startswith('//'):
                  # Избегаем добавления двойных ";" к закрывающим/открывающим блокам, ветвлениям и объявлениям
                  if not line.endswith('{') and not line.endswith('}') and not line.endswith(';'):
                      if not any(line.startswith(x) for x in ['if', 'else', 'while', 'for', 'do', 'void', 'const char*', 'int']):
                          line = line + ';'
                  lines.append(line)
              else:
                  lines.append(line)

          cpp_code = '\n'.join(lines)

          cpp = '''#include <stdio.h>
          #include <math.h>
          #include <stdlib.h>
          #include <time.h>
          #include <vector>
          #include <string>
          #include <map>

          // --- GIG FRAMEWORK ENGINE RUNTIME STUBS ---
          void graphics_clear(float r, float g, float b) { printf("clear %f %f %f\\n", r, g, b); }
          void graphics_draw_rect(float x, float y, float w, float h, const char* color) { printf("rect %f,%f %fx%f color %s\\n", x,y,w,h,color); }
          void graphics_draw_circle(float x, float y, float r, const char* color) { printf("circle %f,%f radius %f color %s\\n", x,y,r,color); }
          void graphics_draw_text(const char* text, float x, float y, float size) { printf("text \\"%s\\" at %f,%f size %f\\n", text, x, y, size); }
          void graphics_draw_sprite(const char* name, float x, float y) { printf("sprite %s drawn at %f,%f\\n", name, x, y); }

          void physics2d_newWorld(float gx, float gy) { printf("Physics world created with gravity: %f, %f\\n", gx, gy); }
          void physics2d_newBody(const char* name, float x, float y, const char* type) { printf("Physics body %s created at %f,%f type %s\\n", name, x, y, type); }

          void input_key_down(const char* key) {}
          bool input_key_pressed(const char* key) { return false; }

          void audio_load(const char* name, const char* path) { printf("Audio loaded %s from %s\\n", name, path); }
          void audio_play(const char* name) { printf("Audio playing: %s\\n", name); }

          void ui_newMenu(const char* name) { printf("UI Menu created: %s\\n", name); }
          void ui_newHUD() { printf("UI HUD created\\n"); }

          void timer_new(int ms, const char* cb) { printf("Timer registered: %d ms, callback: %s\\n", ms, cb); }
          void tween_to(const char* target, float dur, const char* props) { printf("Tween registered for %s over %f s\\n", target, dur); }

          void storage_save(const char* filename, const char* data) { printf("Storage: saved %s to %s\\n", data, filename); }
          const char* storage_load(const char* filename) { return "100"; }

          const char* json_encode(const char* key, const char* val) { return "{\\"key\\": \\"val\\"}"; }
          const char* json_decode(const char* raw) { return "decoded"; }

          void camera_new() { printf("Camera initialized\\n"); }
          void camera_follow(float x, float y) { printf("Camera following %f, %f\\n", x, y); }
          void camera_apply() { printf("Camera matrix applied\\n"); }
          void camera_unapply() { printf("Camera matrix unapplied\\n"); }

          void firebase_init(const char* url) { printf("Firebase client initialized for %s\\n", url); }
          void firebase_put(const char* path, const char* data) { printf("Firebase PUT to %s with %s\\n", path, data); }
          void firebase_post(const char* path, const char* data) {}
          void firebase_get(const char* path) {}

          // --- TRANSPILED CODE STARTS HERE ---
          ''' + cpp_code + '''

          // --- ENTRY POINT ---
          int main() {
              srand(time(NULL));
              game_load();
              for (int i = 0; i < 5; i++) {
                  game_update(0.016f);
                  game_draw();
              }
              return 0;
          }
          '''

          with open('main.cpp', 'w', encoding='utf-8') as f:
              f.write(cpp)
          EOF

      - name: Compile Windows Binary
        run: g++ -O3 main.cpp -o GigFlow.exe -lm
      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GigFlow-Windows
          path: GigFlow.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;26.3.11579264"
      - name: Build Android Shared Library Source
        shell: bash
        run: |
          python3 << 'EOF'
          import re

          with open('main.gig', 'r', encoding='utf-8') as f:
              code = f.read()

          code = re.sub(r'--.*$', '', code, flags=re.MULTILINE)
          code = re.sub(r'import\s+\w+', '', code)

          code = re.sub(r'local\s+(\w+)\s*=\s*\{\s*\}', r'std::vector<int> \1;', code)
          code = re.sub(r'local\s+(\w+)\s*=\s*"([^"]*)"', r'const char* \1 = "\2";', code)
          code = re.sub(r'local\s+(\w+)\s*=\s*([^;\n]+)', r'int \1 = \2;', code)

          code = re.sub(r'function\s+(\w+)\s*\(([^)]*)\)', r'void \1(\2) {', code)
          code = re.sub(r'function\s+(\w+):(\w+)\s*\(([^)]*)\)', r'void \1_\2(\3) {', code)
          code = re.sub(r'(\w+):(\w+)\s*\(([^)]*)\)', r'\1_\2(\3)', code)

          code = re.sub(r'end', r'}', code)

          code = re.sub(r'print\s*\(\s*"([^"]*)"\s*\)', r'printf("\1\\n");', code)
          code = re.sub(r'print\s*\(\s*"([^"]*)"\s*\.\.\s*(\w+)\s*\)', r'printf("\1 %d\\n", \2);', code)
          code = re.sub(r'print\s*\(\s*(\w+)\s*\.\.\s*"([^"]*)"\s*\)', r'printf("%d \2\\n", \1);', code)
          code = re.sub(r'print\s*\(\s*"([^"]*)"\s*\.\.\s*"([^"]*)"\s*\)', r'printf("\1\2\\n");', code)

          code = re.sub(r'graphics_draw_text\s*\(\s*"([^"]*)"\s*\.\.\s*(\w+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^)]+)\)',
                        r'printf("\1 %d at %f, %f size %f\\n", \2, (float)\3, (float)\4, (float)\5);', code)
          code = re.sub(r'graphics_draw_text\s*\(\s*"([^"]*)"\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^)]+)\)',
                        r'printf("\1 at %f, %f size %f\\n", (float)\2, (float)\3, (float)\4);', code)

          code = re.sub(r'graphics_draw_circle\s*\(([^,]+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*"([^"]*)"\s*\)',
                        r'printf("circle at %f, %f radius %f color %s\\n", (float)\1, (float)\2, (float)\3, "\4");', code)
          code = re.sub(r'graphics_draw_rect\s*\(([^,]+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*"([^"]*)"\s*\)',
                        r'printf("rect at %f, %f %fx%f color %s\\n", (float)\1, (float)\2, (float)\3, (float)\4, "\5");', code)
          code = re.sub(r'graphics_clear\s*\(([^,]+)\s*,\s*([^,]+)\s*,\s*([^)]+)\)',
                        r'printf("clear %f %f %f\\n", (float)\1, (float)\2, (float)\3);', code)

          code = re.sub(r'math\.floor\s*\(([^)]+)\)', r'(int)(\1)', code)
          code = re.sub(r'math\.sqrt\s*\(([^)]+)\)', r'sqrt(\1)', code)
          code = re.sub(r'math\.random\s*\(([^)]+)\)', r'(rand() % \1)', code)
          code = re.sub(r'math\.min\s*\(([^,]+)\s*,\s*([^)]+)\)', r'(\1 < \2 ? \1 : \2)', code)
          code = re.sub(r'math\.max\s*\(([^,]+)\s*,\s*([^)]+)\)', r'(\1 > \2 ? \1 : \2)', code)
          code = re.sub(r'math\.abs\s*\(([^)]+)\)', r'abs(\1)', code)

          code = re.sub(r'if\s+([^\n]+)\s+then', r'if (\1) {', code)
          code = re.sub(r'elseif\s+([^\n]+)\s+then', r'} else if (\1) {', code)
          code = re.sub(r'else', r'} else {', code)

          code = re.sub(r'for\s+(\w+)\s*=\s*([^,]+)\s*,\s*([^,]+)\s+do', r'for (int \1 = \2; \1 <= \3; \1++) {', code)
          code = re.sub(r'for\s+(\w+)\s*,\s*(\w+)\s+in\s+pairs\s*\(([^)]+)\)\s+do', r'for (auto \1 : \3) { int \2 = \1;', code)

          code = re.sub(r'while\s+([^\n]+)\s+do', r'while (\1) {', code)
          code = re.sub(r'repeat', r'do {', code)
          code = re.sub(r'until\s+([^\n]+)', r'} while (!(\1));', code)

          code = re.sub(r'return\s+([^;\n]+)', r'return \1;', code)

          code = re.sub(r'table\.insert\s*\(([^,]+)\s*,\s*([^)]+)\)', r'\1.push_back(\2);', code)
          code = re.sub(r'table\.remove\s*\(([^,]+)\s*,\s*([^)]+)\)', r'\1.erase(\1.begin() + \2);', code)
          code = re.sub(r'#(\w+)', r'\1.size()', code)
          code = re.sub(r'(\w+)\[(\w+)\]', r'\1[\2]', code)

          code = re.sub(r'\band\b', r'&&', code)
          code = re.sub(r'\bor\b', r'||', code)
          code = re.sub(r'\bnot\b', r'!', code)

          lines = []
          for line in code.split('\n'):
              line = line.strip()
              if line and not line.startswith('//'):
                  if not line.endswith('{') and not line.endswith('}') and not line.endswith(';'):
                      if not any(line.startswith(x) for x in ['if', 'else', 'while', 'for', 'do', 'void', 'const char*', 'int']):
                          line = line + ';'
                  lines.append(line)
              else:
                  lines.append(line)

          cpp_code = '\n'.join(lines)

          cpp = '''#include <stdio.h>
          #include <math.h>
          #include <stdlib.h>
          #include <time.h>
          #include <vector>
          #include <string>
          #include <map>
          #include <android/log.h>

          #define LOGI(...) ((void)__android_log_print(ANDROID_LOG_INFO, "GigFlow-Android", __VA_ARGS__))

          void graphics_clear(float r, float g, float b) { LOGI("clear %f %f %f", r, g, b); }
          void graphics_draw_rect(float x, float y, float w, float h, const char* color) { LOGI("rect %f,%f %fx%f color %s", x,y,w,h,color); }
          void graphics_draw_circle(float x, float y, float r, const char* color) { LOGI("circle %f,%f radius %f color %s", x,y,r,color); }
          void graphics_draw_text(const char* text, float x, float y, float size) { LOGI("text \\"%s\\" at %f,%f size %f", text, x, y, size); }
          void graphics_draw_sprite(const char* name, float x, float y) {}

          void physics2d_newWorld(float gx, float gy) { LOGI("Physics world: %f, %f", gx, gy); }
          void physics2d_newBody(const char* name, float x, float y, const char* type) { LOGI("Physics body: %s at %f,%f", name, x, y); }

          void input_key_down(const char* key) {}
          bool input_key_pressed(const char* key) { return false; }

          void audio_load(const char* name, const char* path) {}
          void audio_play(const char* name) {}

          void ui_newMenu(const char* name) {}
          void ui_newHUD() {}

          void timer_new(int ms, const char* cb) {}
          void tween_to(const char* target, float dur, const char* props) {}

          void storage_save(const char* filename, const char* data) {}
          const char* storage_load(const char* filename) { return "100"; }

          const char* json_encode(const char* key, const char* val) { return "{}"; }
          const char* json_decode(const char* raw) { return "{}"; }

          void camera_new() {}
          void camera_follow(float x, float y) {}
          void camera_apply() {}
          void camera_unapply() {}

          void firebase_init(const char* url) {}
          void firebase_put(const char* path, const char* data) {}
          void firebase_post(const char* path, const char* data) {}
          void firebase_get(const char* path) {}

          // --- TRANSPILED CODE STARTS HERE ---
          ''' + cpp_code + '''

          extern "C" {
              // Точка входа для Android (через JNI / NativeActivity)
              void android_main(struct android_app* state) {
                  LOGI("Gig App Started");
                  game_load();
                  for(int i=0; i<10; i++) {
                      game_update(0.016f);
                      game_draw();
                  }
              }
          }
          '''

          with open('main.cpp', 'w', encoding='utf-8') as f:
              f.write(cpp)
          EOF

      - name: Compile Android shared library
        run: |
          NDK=$ANDROID_HOME/ndk/26.3.11579264
          TC=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin
          $TC/aarch64-linux-android34-clang++ main.cpp -o libmain.so -shared -fPIC -O3 -static-libstdc++ -lm -llog
      - name: Package APK Structure
        run: |
          mkdir -p lib/arm64-v8a
          cp libmain.so lib/arm64-v8a/
          zip -r GigFlow.apk lib
      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GigFlow-Android
          path: GigFlow.apk
