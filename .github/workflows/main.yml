name: CubicLang Compiler and Builder

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Environment
      uses: android-actions/setup-android@v3
    - run: sdkmanager "platforms;android-34" "build-tools;34.0.0"
    - uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Create Transpiler
      run: |
        cat << 'EOF' > transpiler.py
        import os, re

        def compile_cubic(file_path):
            if not os.path.exists(file_path):
                return ""
            with open(file_path, 'r') as f:
                lines = f.readlines()
            
            cpp_code = ""
            for line in lines:
                line = line.strip()
                if not line or line.startswith("#"): continue
                parts = re.findall(r'(?:[^\s"]|"(?:\\.|[^"])*")+', line)
                if not parts: continue
                cmd = parts[0]
                
                try:
                    if cmd == "background":
                        cpp_code += f"glClearColor({parts[1]}, {parts[2]}, {parts[3]}, 1.0f); glClear(GL_COLOR_BUFFER_BIT);\n"
                    elif cmd == "rect":
                        # Ожидаем: x y w h r g b
                        cpp_code += f"drawRect({parts[1]}, {parts[2]}, {parts[3]}, {parts[4]}, {parts[5]}, {parts[6]}, {parts[7]});\n"
                    elif cmd == "button":
                        # Текст, x, y, w, h. Если h нет - ставим 100
                        txt = parts[1]
                        x, y, w = parts[2], parts[3], parts[4]
                        h = parts[5] if len(parts) > 5 else "100.0f"
                        cpp_code += f"drawButton({txt}, {x}, {y}, {w}, {h});\n"
                except Exception as e:
                    print(f"Skip line due to error: {line} -> {e}")
            return cpp_code

        logic = compile_cubic('main.cubic')

        template = """
        #include <android_native_app_glue.h>
        #include <GLES2/gl2.h>
        #include <EGL/egl.h>

        extern "C" {
            void drawRect(float x, float y, float w, float h, float r, float g, float b) {
                // Тут можно вставить реальный код отрисовки треугольников
            }
            void drawButton(const char* text, float x, float y, float w, float h) {
                // Код для кнопки
            }
            
            // Важно: android_main должна быть в extern "C" для линковщика
            void android_main(struct android_app* state) {
                state->onAppCmd = [](struct android_app* app, int32_t cmd) {
                    if (cmd == APP_CMD_INIT_WINDOW) {
                        EGLDisplay display = eglGetDisplay(EGL_DEFAULT_DISPLAY);
                        eglInitialize(display, 0, 0);
                        EGLConfig config; EGLint numConfigs;
                        EGLint attribs[] = { EGL_RENDERABLE_TYPE, EGL_OPENGL_ES2_BIT, EGL_SURFACE_TYPE, EGL_WINDOW_BIT, EGL_BLUE_SIZE, 8, EGL_GREEN_SIZE, 8, EGL_RED_SIZE, 8, EGL_NONE };
                        eglChooseConfig(display, attribs, &config, 1, &numConfigs);
                        EGLSurface surface = eglCreateWindowSurface(display, config, app->window, NULL);
                        EGLContext context = eglCreateContext(display, config, NULL, new EGLint[3]{EGL_CONTEXT_CLIENT_VERSION, 2, EGL_NONE});
                        eglMakeCurrent(display, surface, surface, context);
                    }
                };

                while (1) {
                    int ident, events;
                    struct android_poll_source* source;
                    while ((ident = ALooper_pollAll(0, NULL, &events, (void**)&source)) >= 0) {
                        if (source != NULL) source->process(state, source);
                        if (state->destroyRequested != 0) return;
                    }
                    if (state->window != NULL) {
                        {LOGIC}
                        eglSwapBuffers(eglGetDisplay(EGL_DEFAULT_DISPLAY), eglGetCurrentSurface(EGL_READ));
                    }
                }
            }
        }
        """.replace("{LOGIC}", logic)

        with open("generated_main.cpp", "w") as f:
            f.write(template)
        EOF
        python3 transpiler.py

    - name: Build
      run: |
        TC=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin
        GLUE=$ANDROID_NDK_ROOT/sources/android/native_app_glue
        
        # 1. Компилируем Glue как C
        $TC/aarch64-linux-android24-clang -c $GLUE/android_native_app_glue.c -o glue.o -I$GLUE
        
        # 2. Компилируем твой язык как C++ и соединяем
        $TC/aarch64-linux-android24-clang++ -shared -fPIC \
            generated_main.cpp glue.o \
            -I$GLUE -landroid -llog -lGLESv2 -lEGL \
            -o libmain.so

    - name: Package
      run: |
        mkdir -p staging/lib/arm64-v8a
        cp libmain.so staging/lib/arm64-v8a/libmain.so
        
        cat << 'EOF' > AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.cubic.lang">
          <application android:label="CubicApp" android:hasCode="false">
            <activity android:name="android.app.NativeActivity" android:configChanges="orientation|keyboardHidden">
              <meta-data android:name="android.app.lib_name" android:value="main" />
              <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
              </intent-filter>
            </activity>
          </application>
        </manifest>
        EOF

        BT=$ANDROID_HOME/build-tools/34.0.0
        $BT/aapt package -f -M AndroidManifest.xml -I $ANDROID_HOME/platforms/android-34/android.jar -F unsigned.apk staging/
        keytool -genkey -v -keystore d.ks -storepass android -alias a -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=X"
        $BT/apksigner sign --ks d.ks --ks-pass pass:android --out CubicProject.apk unsigned.apk

    - uses: actions/upload-artifact@v4
      with:
        name: CubicLanguageApp
        path: CubicProject.apk
