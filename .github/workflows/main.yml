name: Gig-Flow

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install MinGW
        run: choco install mingw -y
      - name: Create Demo main.gig
        shell: bash
        run: |
          cat << 'EOF' > main.gig
          import graphics
          import physics2d
          import audio
          import input
          import ui
          import timer
          import tween
          import storage
          import firebase
          import camera
          import json

          local score = 0
          local highScore = 100
          local isGameOver = 0
          local playerX = 100
          local playerY = 100

          function game_load()
              storage:save("save.dat", "100")
              local loadedScore = storage:load("save.dat")
              
              physics2d:newWorld(0.0, 9.8)
              physics2d:newBody("player", 100, 100, "dynamic")
              
              audio:load("jump", "jump.wav")
              audio:play("jump")
              
              ui:newMenu("main")
              ui:newHUD()
              
              input:newJoystick("movement_stick", 120, 480, 80, 40)
              
              timer:new(1000, "onTimer")
              tween:to("player", 2.0, "x=200")
              
              camera:new()
              camera:follow(100, 100)
              
              local jsonStr = json:encode("score", "100")
              
              firebase:init("https://gig-default-rtdb.firebaseio.com/")
              firebase:put("scores/player1", "100")
              
              print("Game Loaded Successfully")
          end

          function game_update(dt)
              local joyX = input:getJoystickAxis("movement_stick", "x")
              local joyY = input:getJoystickAxis("movement_stick", "y")
              
              playerX = playerX + joyX * 5
              playerY = playerY + joyY * 5

              if input:key_pressed("space") then
                  audio:play("jump")
                  score = score + 1
              end
          end

          function game_draw()
              camera:apply()
              graphics:clear(0.1, 0.1, 0.1)
              graphics:draw_rect(0, 500, 800, 100, "green")
              graphics:draw_circle(playerX, playerY, 30, "blue")
              graphics:draw_text("Score: " .. score, 10, 30, 20)
              
              graphics:draw_circle(120, 480, 80, "gray")
              graphics:draw_circle(120, 480, 40, "white")
              
              camera:unapply()
          end
          EOF
          echo "Demo main.gig has been successfully written."

      - name: Build C++ Source
        shell: bash
        run: |
          python3 << 'EOF'
          import re

          with open('main.gig', 'r', encoding='utf-8') as f:
              lines = f.readlines()

          processed_lines = []
          for line in lines:
              line = re.sub(r'--.*$', '', line)
              if re.match(r'^\s*import\s+', line):
                  continue
              processed_lines.append(line)

          code = "".join(processed_lines)

          code = re.sub(r'(\w+):(\w+)\s*\(([^)]*)\)', r'\1_\2(\3)', code)
          code = re.sub(r'function\s+(\w+)\s*\(\s*dt\s*\)', r'void \1(float dt) {', code)
          code = re.sub(r'function\s+(\w+)\s*\(([^)]*)\)', r'void \1(\2) {', code)
          code = re.sub(r'function\s+(\w+)_(\w+)\s*\(([^)]*)\)', r'void \1_\2(\3) {', code)
          code = re.sub(r'\bend\b', r'}', code)

          def var_replacer(match):
              var_name = match.group(1)
              val = match.group(2).strip()
              if val.startswith('"') or val.endswith('"'):
                  return f'const char* {var_name} = {val};'
              elif 'storage_load' in val or 'json_encode' in val or 'json_decode' in val:
                  return f'const char* {var_name} = {val};'
              elif 'getJoystickAxis' in val:
                  return f'float {var_name} = {val};'
              elif '.' in val and not val.startswith('"'):
                  return f'float {var_name} = {val};'
              elif val == 'true' or val == 'false':
                  return f'bool {var_name} = {val};'
              elif val.startswith('{'):
                  return f'std::vector<int> {var_name};'
              else:
                  return f'float {var_name} = {val};'

          code = re.sub(r'local\s+(\w+)\s*=\s*([^;\n]+)', var_replacer, code)

          code = re.sub(r'print\s*\(\s*"([^"]*)"\s*\)', r'printf("\1\\n");', code)
          code = re.sub(r'print\s*\(\s*"([^"]*)"\s*\.\.\s*(\w+)\s*\)', r'printf("\1 %f\\n", (float)\2);', code)
          code = re.sub(r'print\s*\(\s*(\w+)\s*\.\.\s*"([^"]*)"\s*\)', r'printf("%f \2\\n", (float)\1);', code)
          code = re.sub(r'print\s*\(\s*"([^"]*)"\s*\.\.\s*"([^"]*)"\s*\)', r'printf("\1\2\\n");', code)

          code = re.sub(r'graphics_draw_text\s*\(\s*"([^"]*)"\s*\.\.\s*(\w+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^)]+)\)',
                        r'printf("\1 %f at %f, %f size %f\\n", (float)\2, (float)\3, (float)\4, (float)\5);', code)
          code = re.sub(r'graphics_draw_text\s*\(\s*"([^"]*)"\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^)]+)\)',
                        r'printf("\1 at %f, %f size %f\\n", (float)\2, (float)\3, (float)\4);', code)

          code = re.sub(r'graphics_draw_circle\s*\(([^,]+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*"([^"]*)"\s*\)',
                        r'printf("circle at %f, %f radius %f color %s\\n", (float)\1, (float)\2, (float)\3, "\4");', code)
          code = re.sub(r'graphics_draw_rect\s*\(([^,]+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*"([^"]*)"\s*\)',
                        r'printf("rect at %f, %f %fx%f color %s\\n", (float)\1, (float)\2, (float)\3, (float)\4, "\5");', code)
          code = re.sub(r'graphics_clear\s*\(([^,]+)\s*,\s*([^,]+)\s*,\s*([^)]+)\)',
                        r'printf("clear %f %f %f\\n", (float)\1, (float)\2, (float)\3);', code)

          code = re.sub(r'math\.floor\s*\(([^)]+)\)', r'(int)(\1)', code)
          code = re.sub(r'math\.sqrt\s*\(([^)]+)\)', r'sqrt(\1)', code)
          code = re.sub(r'math\.random\s*\(([^)]+)\)', r'(rand() % \1)', code)
          code = re.sub(r'math\.min\s*\(([^,]+)\s*,\s*([^)]+)\)', r'(\1 < \2 ? \1 : \2)', code)
          code = re.sub(r'math\.max\s*\(([^,]+)\s*,\s*([^)]+)\)', r'(\1 > \2 ? \1 : \2)', code)
          code = re.sub(r'math\.abs\s*\(([^)]+)\)', r'abs(\1)', code)

          code = re.sub(r'if\s+([^\n]+)\s+then', r'if (\1) {', code)
          code = re.sub(r'elseif\s+([^\n]+)\s+then', r'} else if (\1) {', code)
          code = re.sub(r'else', r'} else {', code)

          code = re.sub(r'for\s+(\w+)\s*=\s*([^,]+)\s*,\s*([^,]+)\s+do', r'for (int \1 = \2; \1 <= \3; \1++) {', code)
          code = re.sub(r'while\s+([^\n]+)\s+do', r'while (\1) {', code)
          code = re.sub(r'return\s+([^;\n]+)', r'return \1;', code)

          code = re.sub(r'\band\b', r'&&', code)
          code = re.sub(r'\bor\b', r'||', code)
          code = re.sub(r'\bnot\b', r'!', code)

          lines = []
          for line in code.split('\n'):
              line = line.strip()
              if line and not line.startswith('//'):
                  if not line.endswith('{') and not line.endswith('}') and not line.endswith(';'):
                      if not any(line.startswith(x) for x in ['if', 'else', 'while', 'for', 'void', 'const char*', 'int', 'float', 'bool']):
                          line = line + ';'
                  lines.append(line)
              else:
                  lines.append(line)

          cpp_code = '\n'.join(lines)

          cpp = '''#include <stdio.h>
          #include <math.h>
          #include <stdlib.h>
          #include <time.h>
          #include <vector>
          #include <string>
          #include <map>

          void graphics_clear(float r, float g, float b) { printf("clear %f %f %f\\n", r, g, b); }
          void graphics_draw_rect(float x, float y, float w, float h, const char* color) { printf("rect %f,%f %fx%f color %s\\n", x,y,w,h,color); }
          void graphics_draw_circle(float x, float y, float r, const char* color) { printf("circle %f,%f radius %f color %s\\n", x,y,r,color); }
          void graphics_draw_text(const char* text, float x, float y, float size) { printf("text \\"%s\\" at %f,%f size %f\\n", text, x, y, size); }

          void physics2d_newWorld(float gx, float gy) { printf("Physics world created: %f, %f\\n", gx, gy); }
          void physics2d_newBody(const char* name, float x, float y, const char* type) { printf("Physics body %s created at %f,%f\\n", name, x, y); }

          struct Joystick {
              std::string id;
              float x, y;
              float baseRadius;
              float stickRadius;
          };
          std::map<std::string, Joystick> active_joysticks;

          void input_newJoystick(const char* id, float x, float y, float baseRadius, float stickRadius) {
              active_joysticks[id] = {id, x, y, baseRadius, stickRadius};
              printf("Joystick %s created at %f, %f\\n", id, x, y);
          }

          float input_getJoystickAxis(const char* id, const char* axis) {
              return 0.5f;
          }

          void input_key_down(const char* key) {}
          bool input_key_pressed(const char* key) { return false; }

          void audio_load(const char* name, const char* path) {}
          void audio_play(const char* name) {}

          void ui_newMenu(const char* name) {}
          void ui_newHUD() {}

          void timer_new(int ms, const char* cb) {}
          void tween_to(const char* target, float dur, const char* props) {}

          void storage_save(const char* filename, const char* data) {}
          const char* storage_load(const char* filename) { return "100"; }

          const char* json_encode(const char* key, const char* val) { return "{}"; }
          const char* json_decode(const char* raw) { return "{}"; }

          void camera_new() {}
          void camera_follow(float x, float y) {}
          void camera_apply() {}
          void camera_unapply() {}

          void firebase_init(const char* url) {}
          void firebase_put(const char* path, const char* data) {}

          // --- TRANSPILED CODE STARTS HERE ---
          ''' + cpp_code + '''

          int main() {
              srand(time(NULL));
              game_load();
              for (int i = 0; i < 5; i++) {
                  game_update(0.016f);
                  game_draw();
              }
              return 0;
          }
          '''

          with open('main.cpp', 'w', encoding='utf-8') as f:
              f.write(cpp)
          EOF

      - name: Compile Windows Binary
        run: g++ -O3 main.cpp -o GigFlow.exe -lm
      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GigFlow-Windows
          path: GigFlow.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and Build Tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;26.3.11579264" "build-tools;34.0.0" "platforms;android-34"

      - name: Build Android Shared Library Source
        shell: bash
        run: |
          python3 << 'EOF'
          import re

          with open('main.gig', 'r', encoding='utf-8') as f:
              lines = f.readlines()

          processed_lines = []
          for line in lines:
              line = re.sub(r'--.*$', '', line)
              if re.match(r'^\s*import\s+', line):
                  continue
              processed_lines.append(line)

          code = "".join(processed_lines)

          code = re.sub(r'(\w+):(\w+)\s*\(([^)]*)\)', r'\1_\2(\3)', code)
          code = re.sub(r'function\s+(\w+)\s*\(\s*dt\s*\)', r'void \1(float dt) {', code)
          code = re.sub(r'function\s+(\w+)\s*\(([^)]*)\)', r'void \1(\2) {', code)
          code = re.sub(r'function\s+(\w+)_(\w+)\s*\(([^)]*)\)', r'void \1_\2(\3) {', code)
          code = re.sub(r'\bend\b', r'}', code)

          def var_replacer(match):
              var_name = match.group(1)
              val = match.group(2).strip()
              if val.startswith('"') or val.endswith('"'):
                  return f'const char* {var_name} = {val};'
              elif 'storage_load' in val or 'json_encode' in val or 'json_decode' in val:
                  return f'const char* {var_name} = {val};'
              elif 'getJoystickAxis' in val:
                  return f'float {var_name} = {val};'
              elif '.' in val and not val.startswith('"'):
                  return f'float {var_name} = {val};'
              elif val == 'true' or val == 'false':
                  return f'bool {var_name} = {val};'
              elif val.startswith('{'):
                  return f'std::vector<int> {var_name};'
              else:
                  return f'float {var_name} = {val};'

          code = re.sub(r'local\s+(\w+)\s*=\s*([^;\n]+)', var_replacer, code)

          code = re.sub(r'print\s*\(\s*"([^"]*)"\s*\)', r'printf("\1\\n");', code)
          code = re.sub(r'print\s*\(\s*"([^"]*)"\s*\.\.\s*(\w+)\s*\)', r'printf("\1 %f\\n", (float)\2);', code)
          code = re.sub(r'print\s*\(\s*(\w+)\s*\.\.\s*"([^"]*)"\s*\)', r'printf("%f \2\\n", (float)\1);', code)
          code = re.sub(r'print\s*\(\s*"([^"]*)"\s*\.\.\s*"([^"]*)"\s*\)', r'printf("\1\2\\n");', code)

          code = re.sub(r'graphics_draw_text\s*\(\s*"([^"]*)"\s*\.\.\s*(\w+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^)]+)\)',
                        r'printf("\1 %f at %f, %f size %f\\n", (float)\2, (float)\3, (float)\4, (float)\5);', code)
          code = re.sub(r'graphics_draw_text\s*\(\s*"([^"]*)"\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^)]+)\)',
                        r'printf("\1 at %f, %f size %f\\n", (float)\2, (float)\3, (float)\4);', code)

          code = re.sub(r'graphics_draw_circle\s*\(([^,]+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*"([^"]*)"\s*\)',
                        r'printf("circle at %f, %f radius %f color %s\\n", (float)\1, (float)\2, (float)\3, "\4");', code)
          code = re.sub(r'graphics_draw_rect\s*\(([^,]+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*"([^"]*)"\s*\)',
                        r'printf("rect at %f, %f %fx%f color %s\\n", (float)\1, (float)\2, (float)\3, (float)\4, "\5");', code)
          code = re.sub(r'graphics_clear\s*\(([^,]+)\s*,\s*([^,]+)\s*,\s*([^)]+)\)',
                        r'printf("clear %f %f %f\\n", (float)\1, (float)\2, (float)\3);', code)

          code = re.sub(r'math\.floor\s*\(([^)]+)\)', r'(int)(\1)', code)
          code = re.sub(r'math\.sqrt\s*\(([^)]+)\)', r'sqrt(\1)', code)
          code = re.sub(r'math\.random\s*\(([^)]+)\)', r'(rand() % \1)', code)
          code = re.sub(r'math\.min\s*\(([^,]+)\s*,\s*([^)]+)\)', r'(\1 < \2 ? \1 : \2)', code)
          code = re.sub(r'math\.max\s*\(([^,]+)\s*,\s*([^)]+)\)', r'(\1 > \2 ? \1 : \2)', code)
          code = re.sub(r'math\.abs\s*\(([^)]+)\)', r'abs(\1)', code)

          code = re.sub(r'if\s+([^\n]+)\s+then', r'if (\1) {', code)
          code = re.sub(r'elseif\s+([^\n]+)\s+then', r'} else if (\1) {', code)
          code = re.sub(r'else', r'} else {', code)

          code = re.sub(r'for\s+(\w+)\s*=\s*([^,]+)\s*,\s*([^,]+)\s+do', r'for (int \1 = \2; \1 <= \3; \1++) {', code)
          code = re.sub(r'while\s+([^\n]+)\s+do', r'while (\1) {', code)
          code = re.sub(r'return\s+([^;\n]+)', r'return \1;', code)

          code = re.sub(r'\band\b', r'&&', code)
          code = re.sub(r'\bor\b', r'||', code)
          code = re.sub(r'\bnot\b', r'!', code)

          lines = []
          for line in code.split('\n'):
              line = line.strip()
              if line and not line.startswith('//'):
                  if not line.endswith('{') and not line.endswith('}') and not line.endswith(';'):
                      if not any(line.startswith(x) for x in ['if', 'else', 'while', 'for', 'void', 'const char*', 'int', 'float', 'bool']):
                          line = line + ';'
                  lines.append(line)
              else:
                  lines.append(line)

          cpp_code = '\n'.join(lines)

          cpp = '''#include <stdio.h>
          #include <math.h>
          #include <stdlib.h>
          #include <time.h>
          #include <vector>
          #include <string>
          #include <map>
          #include <android/log.h>

          #define LOGI(...) ((void)__android_log_print(ANDROID_LOG_INFO, "GigFlow-Android", __VA_ARGS__))

          void graphics_clear(float r, float g, float b) { LOGI("clear %f %f %f", r, g, b); }
          void graphics_draw_rect(float x, float y, float w, float h, const char* color) { LOGI("rect %f,%f %fx%f color %s", x,y,w,h,color); }
          void graphics_draw_circle(float x, float y, float r, const char* color) { LOGI("circle %f,%f radius %f color %s", x,y,r,color); }
          void graphics_draw_text(const char* text, float x, float y, float size) { LOGI("text \\"%s\\" at %f,%f size %f", text, x, y, size); }

          void physics2d_newWorld(float gx, float gy) { LOGI("Physics world: %f, %f", gx, gy); }
          void physics2d_newBody(const char* name, float x, float y, const char* type) { LOGI("Physics body: %s at %f,%f", name, x, y); }

          struct Joystick {
              std::string id;
              float x, y;
              float baseRadius;
              float stickRadius;
          };
          std::map<std::string, Joystick> active_joysticks;

          void input_newJoystick(const char* id, float x, float y, float baseRadius, float stickRadius) {
              active_joysticks[id] = {id, x, y, baseRadius, stickRadius};
              LOGI("Android Touch Joystick [%s] added", id);
          }

          float input_getJoystickAxis(const char* id, const char* axis) {
              return 0.7f; 
          }

          void input_key_down(const char* key) {}
          bool input_key_pressed(const char* key) { return false; }

          void audio_load(const char* name, const char* path) {}
          void audio_play(const char* name) {}

          void ui_newMenu(const char* name) {}
          void ui_newHUD() {}

          void timer_new(int ms, const char* cb) {}
          void tween_to(const char* target, float dur, const char* props) {}

          void storage_save(const char* filename, const char* data) {}
          const char* storage_load(const char* filename) { return "100"; }

          const char* json_encode(const char* key, const char* val) { return "{}"; }
          const char* json_decode(const char* raw) { return "{}"; }

          void camera_new() {}
          void camera_follow(float x, float y) {}
          void camera_apply() {}
          void camera_unapply() {}

          void firebase_init(const char* url) {}
          void firebase_put(const char* path, const char* data) {}

          // --- TRANSPILED CODE STARTS HERE ---
          ''' + cpp_code + '''

          struct android_app;
          extern "C" {
              void ANativeActivity_onCreate(void* activity, void* savedState, size_t savedStateSize) {
                  LOGI("ANativeActivity Created");
                  game_load();
                  game_update(0.016f);
                  game_draw();
              }
          }
          '''

          with open('main.cpp', 'w', encoding='utf-8') as f:
              f.write(cpp)
          EOF

      - name: Compile Android shared library (.so)
        run: |
          NDK=$ANDROID_HOME/ndk/26.3.11579264
          TC=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin
          $TC/aarch64-linux-android34-clang++ main.cpp -o libmain.so -shared -fPIC -O3 -static-libstdc++ -lm -llog -landroid

      - name: Generate Valid Android Package Structure (APK)
        run: |
          mkdir -p project/assets
          mkdir -p project/res/values
          mkdir -p project/lib/arm64-v8a
          
          cp libmain.so project/lib/arm64-v8a/

          cat << 'EOF' > project/res/values/strings.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">GigFlow Game</string>
          </resources>
          EOF

          cat << 'EOF' > project/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.androbiome.gigflow"
              android:versionCode="1"
              android:versionName="1.0">
              
              <uses-sdk android:minSdkVersion="21" android:targetSdkVersion="34" />
              <uses-feature android:glEsVersion="0x00020000" android:required="true" />
              
              <application android:label="@string/app_name" android:hasCode="false">
                  <activity android:name="android.app.NativeActivity"
                      android:label="@string/app_name"
                      android:configChanges="orientation|keyboardHidden|screenSize"
                      android:exported="true">
                      <meta-data android:name="android.app.lib_name" android:value="main" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Package, Align and Sign APK
        run: |
          BUILD_TOOLS=$ANDROID_HOME/build-tools/34.0.0
          PLATFORM=$ANDROID_HOME/platforms/android-34/android.jar

          # 1. Сборка ресурсов
          $BUILD_TOOLS/aapt package -f -M project/AndroidManifest.xml -S project/res -I $PLATFORM -F unsigned.apk
          
          # Упаковываем C++ библиотеку
          cd project
          zip -u ../unsigned.apk lib/arm64-v8a/libmain.so
          cd ..

          # 2. Выравнивание (zipalign)
          $BUILD_TOOLS/zipalign -v -p 4 unsigned.apk aligned.apk

          # 3. Генерация самоподписанного сертификата
          keytool -genkeypair -v -keystore release.keystore -alias gig_key -keyalg RSA -keysize 2048 -validity 10000 -storepass "android" -keypass "android" -dname "CN=Androbiome, O=Gig, C=RU"

          # 4. Подпись APK с исправленным синтаксисом параметров (--ks вместо --keystore)
          $BUILD_TOOLS/apksigner sign --ks release.keystore --storepass "android" --keypass "android" --out GigFlow.apk aligned.apk

          # 5. Верификация
          $BUILD_TOOLS/apksigner verify GigFlow.apk

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GigFlow-Android
          path: GigFlow.apk
