name: Gig-Flow

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install MinGW
        run: choco install mingw -y
      - name: Build
        shell: bash
        run: |
          python3 << 'EOF'
          import re
          with open('main.gig', 'r', encoding='utf-8') as f:
              code = f.read()
          code = re.sub(r'--.*$', '', code, flags=re.MULTILINE)
          code = re.sub(r'local\s+(\w+)\s*=\s*([^;\n]+)', r'auto \1 = \2;', code)
          code = re.sub(r'function\s+(\w+)\s*\(([^)]*)\)', r'void \1(\2) {', code)
          code = re.sub(r'end', r'}', code)
          code = re.sub(r'print\s*\(([^)]+)\)', r'printf("\1\\n");', code)
          code = re.sub(r'graphics\.draw_text\s*\(([^,]+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^)]+)\)', r'printf("\1 at %f, %f size %f\\n", \2, \3, \4);', code)
          code = re.sub(r'graphics\.draw_circle\s*\(([^,]+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^)]+)\)', r'printf("circle at %f, %f radius %f color %s\\n", \1, \2, \3, \4);', code)
          code = re.sub(r'graphics\.draw_rect\s*\(([^,]+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^)]+)\)', r'printf("rect at %f, %f %fx%f color %s\\n", \1, \2, \3, \4, \5);', code)
          code = re.sub(r'graphics\.clear\s*\(([^,]+)\s*,\s*([^,]+)\s*,\s*([^)]+)\)', r'printf("clear %f %f %f\\n", \1, \2, \3);', code)
          code = re.sub(r'math\.floor\s*\(([^)]+)\)', r'(int)(\1)', code)
          code = re.sub(r'math\.sqrt\s*\(([^)]+)\)', r'sqrt(\1)', code)
          code = re.sub(r'\"([^\"]+)\"\s*\.\.\s*(\w+)', r'printf("\1%f", \2)', code)
          code = re.sub(r'(\w+)\s*\.\.\s*\"([^\"]+)\"', r'printf("%f\2", \1)', code)
          code = re.sub(r'if\s+([^\n]+)\s+then', r'if (\1) {', code)
          code = re.sub(r'elseif\s+([^\n]+)\s+then', r'} else if (\1) {', code)
          code = re.sub(r'else', r'} else {', code)
          code = re.sub(r'for\s+(\w+)\s*=\s*([^,]+)\s*,\s*([^,]+)\s+do', r'for (int \1 = \2; \1 <= \3; \1++) {', code)
          code = re.sub(r'while\s+([^\n]+)\s+do', r'while (\1) {', code)
          code = re.sub(r'return\s+([^;\n]+)', r'return \1;', code)
          lines = []
          for line in code.split('\n'):
              line = line.strip()
              if line and not line.startswith('//'):
                  if not line.endswith('{') and not line.endswith('}') and not line.endswith(';'):
                      line = line + ';'
                  lines.append(line)
              else:
                  lines.append(line)
          cpp = '''
          #include <stdio.h>
          #include <math.h>
          #include <stdlib.h>
          #include <time.h>
          ''' + '\n'.join(lines) + '''
          int main() {
              srand(time(NULL));
              game_load();
              for (int i = 0; i < 10; i++) {
                  game_update(0.016);
                  game_draw();
              }
              return 0;
          }
          '''
          with open('main.cpp', 'w') as f:
              f.write(cpp)
          EOF
      - name: Compile
        run: g++ -O3 main.cpp -o GigFlow.exe
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: GigFlow-Windows
          path: GigFlow.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;26.3.11579264"
      - name: Build
        shell: bash
        run: |
          python3 << 'EOF'
          import re
          with open('main.gig', 'r', encoding='utf-8') as f:
              code = f.read()
          code = re.sub(r'--.*$', '', code, flags=re.MULTILINE)
          code = re.sub(r'local\s+(\w+)\s*=\s*([^;\n]+)', r'auto \1 = \2;', code)
          code = re.sub(r'function\s+(\w+)\s*\(([^)]*)\)', r'void \1(\2) {', code)
          code = re.sub(r'end', r'}', code)
          code = re.sub(r'print\s*\(([^)]+)\)', r'printf("\1\\n");', code)
          code = re.sub(r'graphics\.draw_text\s*\(([^,]+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^)]+)\)', r'printf("\1 at %f, %f size %f\\n", \2, \3, \4);', code)
          code = re.sub(r'graphics\.draw_circle\s*\(([^,]+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^)]+)\)', r'printf("circle at %f, %f radius %f color %s\\n", \1, \2, \3, \4);', code)
          code = re.sub(r'graphics\.draw_rect\s*\(([^,]+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^,]+)\s*,\s*([^)]+)\)', r'printf("rect at %f, %f %fx%f color %s\\n", \1, \2, \3, \4, \5);', code)
          code = re.sub(r'graphics\.clear\s*\(([^,]+)\s*,\s*([^,]+)\s*,\s*([^)]+)\)', r'printf("clear %f %f %f\\n", \1, \2, \3);', code)
          code = re.sub(r'math\.floor\s*\(([^)]+)\)', r'(int)(\1)', code)
          code = re.sub(r'math\.sqrt\s*\(([^)]+)\)', r'sqrt(\1)', code)
          code = re.sub(r'\"([^\"]+)\"\s*\.\.\s*(\w+)', r'printf("\1%f", \2)', code)
          code = re.sub(r'(\w+)\s*\.\.\s*\"([^\"]+)\"', r'printf("%f\2", \1)', code)
          code = re.sub(r'if\s+([^\n]+)\s+then', r'if (\1) {', code)
          code = re.sub(r'elseif\s+([^\n]+)\s+then', r'} else if (\1) {', code)
          code = re.sub(r'else', r'} else {', code)
          code = re.sub(r'for\s+(\w+)\s*=\s*([^,]+)\s*,\s*([^,]+)\s+do', r'for (int \1 = \2; \1 <= \3; \1++) {', code)
          code = re.sub(r'while\s+([^\n]+)\s+do', r'while (\1) {', code)
          code = re.sub(r'return\s+([^;\n]+)', r'return \1;', code)
          lines = []
          for line in code.split('\n'):
              line = line.strip()
              if line and not line.startswith('//'):
                  if not line.endswith('{') and not line.endswith('}') and not line.endswith(';'):
                      line = line + ';'
                  lines.append(line)
              else:
                  lines.append(line)
          cpp = '''
          #include <stdio.h>
          #include <math.h>
          #include <stdlib.h>
          #include <time.h>
          ''' + '\n'.join(lines) + '''
          int main() {
              srand(time(NULL));
              game_load();
              for (int i = 0; i < 10; i++) {
                  game_update(0.016);
                  game_draw();
              }
              return 0;
          }
          '''
          with open('main.cpp', 'w') as f:
              f.write(cpp)
          EOF
      - name: Compile
        run: |
          NDK=$ANDROID_HOME/ndk/26.3.11579264
          TC=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin
          $TC/aarch64-linux-android34-clang++ main.cpp -o libmain.so -shared -fPIC -O3 -static-libstdc++
      - name: Package
        run: |
          mkdir -p lib/arm64-v8a
          cp libmain.so lib/arm64-v8a/
          zip -r GigFlow.apk lib
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: GigFlow-Android
          path: GigFlow.apk
